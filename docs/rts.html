<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARS BARN — RTS Colony View</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: #1a0a05; font-family: 'Courier New', monospace; color: #e0d0c0; }
  canvas { display: block; width: 100% !important; height: 100% !important; }

  /* Subtle vignette — fullscreen friendly */
  #vignette {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 100;
    background: radial-gradient(ellipse at center, transparent 75%, rgba(0,0,0,0.3) 100%);
  }
  #scanlines {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 99;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.03) 3px, rgba(0,0,0,0.03) 6px);
  }
  /* Fullscreen API */
  html:-webkit-full-screen, html:-moz-full-screen, html:fullscreen {
    width: 100%; height: 100%;
  }

  /* Event notifications */
  #event-log {
    position: fixed; top: 50px; left: 50%; transform: translateX(-50%);
    z-index: 60; pointer-events: none;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .event-toast {
    background: rgba(10,5,2,0.9); border: 1px solid rgba(255,120,40,0.5);
    border-radius: 4px; padding: 6px 16px; font-size: 12px;
    text-shadow: 0 0 6px rgba(255,120,40,0.5);
    animation: toastIn 0.4s ease-out, toastOut 0.6s 4s ease-in forwards;
    white-space: nowrap;
  }
  .event-toast.hazard { border-color: rgba(255,60,40,0.7); color: #ff8866; }
  .event-toast.event { border-color: rgba(255,200,40,0.7); color: #ffcc66; }
  .event-toast.info { border-color: rgba(100,200,255,0.5); color: #88ccff; }
  @keyframes toastIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes toastOut { to { opacity: 0; transform: translateY(-10px); } }

  /* Sol speed control */
  #speed-control {
    position: fixed; bottom: 12px; right: 12px; z-index: 50;
    font-size: 11px; opacity: 0.6;
    text-shadow: 0 0 6px rgba(255,120,40,0.5);
  }
  #speed-control span { cursor: pointer; pointer-events: auto; padding: 2px 6px; border-radius: 3px; }
  #speed-control span:hover { background: rgba(255,120,40,0.2); }
  #speed-control span.active { color: #ff8844; font-weight: bold; }

  /* Comms interference overlay */
  #comms-interference {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 98; opacity: 0;
    background: repeating-linear-gradient(0deg,
      transparent 0px, transparent 2px,
      rgba(100,180,255,0.03) 2px, rgba(100,180,255,0.03) 4px);
    mix-blend-mode: screen;
    transition: opacity 2s;
  }
  #comms-interference.active {
    opacity: 1;
    animation: staticFlicker 0.15s infinite;
  }
  @keyframes staticFlicker {
    0% { opacity: 0.6; }
    25% { opacity: 0.8; }
    50% { opacity: 0.5; }
    75% { opacity: 0.9; }
    100% { opacity: 0.7; }
  }

  /* Radiation warning overlay */
  #radiation-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 97; opacity: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(140,40,200,0.15) 100%);
    transition: opacity 1.5s;
  }

  /* HUD panels */
  .hud {
    position: fixed; z-index: 50; pointer-events: none;
    text-shadow: 0 0 6px rgba(255,120,40,0.5);
  }
  .hud-panel {
    background: rgba(10,5,2,0.82);
    border: 1px solid rgba(255,120,40,0.35);
    border-radius: 4px;
    padding: 8px 12px;
    backdrop-filter: blur(4px);
    font-size: 13px;
    line-height: 1.6;
  }
  #hud-top-left { top: 12px; left: 12px; }
  #hud-top-right { top: 12px; right: 12px; text-align: right; }
  #hud-bottom {
    bottom: 12px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 16px;
  }
  .res-bar {
    display: flex; flex-direction: column; align-items: center; min-width: 70px;
  }
  .res-bar-label { font-size: 10px; opacity: 0.7; margin-bottom: 2px; }
  .res-bar-track {
    width: 60px; height: 8px; background: rgba(255,255,255,0.1);
    border-radius: 4px; overflow: hidden;
  }
  .res-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
  .res-bar-val { font-size: 11px; margin-top: 2px; }

  /* FPS HUD */
  #fps-hud {
    position: fixed; z-index: 60; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; display: none;
  }
  #fps-crosshair {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 24px; opacity: 0.6;
  }
  #fps-info {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    text-align: center;
  }
  #fps-info .unit-name { font-size: 18px; color: #4fc3f7; margin-bottom: 4px; }
  #fps-info .hint { font-size: 11px; opacity: 0.5; }
  #fps-hp-bar {
    width: 160px; height: 6px; background: rgba(255,255,255,0.15);
    border-radius: 3px; margin: 6px auto 0; overflow: hidden;
  }
  #fps-hp-fill { height: 100%; background: #4caf50; border-radius: 3px; transition: width 0.3s; }

  /* Connection indicator */
  #conn { font-size: 11px; }

  /* Unit labels */
  .unit-label {
    position: absolute; pointer-events: none; z-index: 40;
    font-size: 10px; color: #fff; text-align: center;
    text-shadow: 0 0 4px #000, 0 1px 2px #000;
    transform: translate(-50%, -100%);
    white-space: nowrap;
  }
</style>
</head>
<body>

<!-- CRT overlays -->
<div id="vignette"></div>
<div id="scanlines"></div>
<div id="comms-interference"></div>
<div id="radiation-overlay"></div>

<!-- HUD: Top-left -->
<div class="hud" id="hud-top-left">
  <div class="hud-panel">
    <div>SOL <span id="sol">001</span></div>
    <div>CRI <span id="cri-bar" style="display:inline-block;width:60px;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;vertical-align:middle;overflow:hidden;"><span id="cri-fill" style="display:block;height:100%;width:30%;background:#4caf50;border-radius:4px;transition:width 0.5s;"></span></span> <span id="cri-val">0.30</span></div>
    <div id="conn">TWIN <span id="conn-dot">🔴</span></div>
  </div>
</div>

<!-- HUD: Top-right -->
<div class="hud" id="hud-top-right">
  <div class="hud-panel">
    <div>MODULES <span id="mod-count">8</span></div>
    <div>CREW <span id="crew-alive">5</span></div>
    <div>PWR <span id="pwr-level">87</span>%</div>
  </div>
</div>

<!-- HUD: Bottom resource bars -->
<div class="hud" id="hud-bottom">
  <div class="hud-panel" style="display:flex;gap:16px;">
    <div class="res-bar">
      <div class="res-bar-label">O₂</div>
      <div class="res-bar-track"><div class="res-bar-fill" id="bar-o2" style="width:82%;background:#4fc3f7;"></div></div>
      <div class="res-bar-val" id="val-o2">82%</div>
    </div>
    <div class="res-bar">
      <div class="res-bar-label">H₂O</div>
      <div class="res-bar-track"><div class="res-bar-fill" id="bar-h2o" style="width:68%;background:#2196f3;"></div></div>
      <div class="res-bar-val" id="val-h2o">68%</div>
    </div>
    <div class="res-bar">
      <div class="res-bar-label">FOOD</div>
      <div class="res-bar-track"><div class="res-bar-fill" id="bar-food" style="width:55%;background:#66bb6a;"></div></div>
      <div class="res-bar-val" id="val-food">55%</div>
    </div>
    <div class="res-bar">
      <div class="res-bar-label">PWR</div>
      <div class="res-bar-track"><div class="res-bar-fill" id="bar-pwr" style="width:87%;background:#ffa726;"></div></div>
      <div class="res-bar-val" id="val-pwr">87%</div>
    </div>
  </div>
</div>

<!-- FPS HUD overlay -->
<div id="fps-hud">
  <div id="fps-crosshair">+</div>
  <div id="fps-info">
    <div class="unit-name" id="fps-unit-name">UNIT</div>
    <div id="fps-hp-bar"><div id="fps-hp-fill"></div></div>
    <div class="hint">ESC or right-click → RTS view</div>
  </div>
</div>

<!-- Unit label container -->
<div id="label-container"></div>

<!-- Fullscreen hint -->
<div id="fs-hint" style="position:fixed;bottom:12px;right:12px;z-index:50;pointer-events:none;font-size:11px;opacity:0.5;text-shadow:0 0 6px rgba(255,120,40,0.5);">
  Press <b>F</b> or double-click for fullscreen
</div>

<!-- Event notifications -->
<div id="event-log"></div>

<!-- Sol speed control -->
<div id="speed-control">
  SOL SPEED:
  <span data-speed="0.5">½×</span>
  <span data-speed="1" class="active">1×</span>
  <span data-speed="3">3×</span>
  <span data-speed="10">10×</span>
  <span data-speed="50">50×</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  'use strict';

  // ─── SCENE SETUP ──────────────────────────────────────────────
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a0a05);
  scene.fog = new THREE.FogExp2(0x2a1008, 0.0025);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  document.body.appendChild(renderer.domElement);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.5, 800);

  // ─── FULLSCREEN TOGGLE (F key or double-click) ────────────────
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen();
    }
  }

  // ─── LIGHTING ─────────────────────────────────────────────────
  const ambientLight = new THREE.AmbientLight(0x334466, 0.35);
  scene.add(ambientLight);

  const sunLight = new THREE.DirectionalLight(0xffaa66, 1.6);
  sunLight.position.set(80, 120, 60);
  sunLight.castShadow = true;
  sunLight.shadow.mapSize.set(2048, 2048);
  sunLight.shadow.camera.left = -120;
  sunLight.shadow.camera.right = 120;
  sunLight.shadow.camera.top = 120;
  sunLight.shadow.camera.bottom = -120;
  sunLight.shadow.camera.near = 1;
  sunLight.shadow.camera.far = 300;
  sunLight.shadow.bias = -0.001;
  scene.add(sunLight);

  const hemiLight = new THREE.HemisphereLight(0xffccaa, 0x442211, 0.3);
  scene.add(hemiLight);

  // ─── TERRAIN ──────────────────────────────────────────────────
  const terrainSize = 500;
  const terrainSeg = 128;
  const terrainGeo = new THREE.PlaneGeometry(terrainSize, terrainSize, terrainSeg, terrainSeg);
  terrainGeo.rotateX(-Math.PI / 2);

  const posAttr = terrainGeo.attributes.position;
  for (let i = 0; i < posAttr.count; i++) {
    const x = posAttr.getX(i);
    const z = posAttr.getZ(i);
    let h = 0;
    h += Math.sin(x * 0.02) * Math.cos(z * 0.015) * 4;
    h += Math.sin(x * 0.05 + 1.3) * Math.sin(z * 0.04 + 0.7) * 2;
    h += Math.cos(x * 0.1 + z * 0.08) * 1.2;
    // craters
    const cx1 = x - 40, cz1 = z + 30, cd1 = Math.sqrt(cx1*cx1 + cz1*cz1);
    if (cd1 < 15) h -= (15 - cd1) * 0.4;
    const cx2 = x + 60, cz2 = z - 50, cd2 = Math.sqrt(cx2*cx2 + cz2*cz2);
    if (cd2 < 10) h -= (10 - cd2) * 0.35;
    // flatten colony area
    const distCenter = Math.sqrt(x*x + z*z);
    if (distCenter < 50) h *= distCenter / 50;
    posAttr.setY(i, h);
  }
  terrainGeo.computeVertexNormals();

  const terrainMat = new THREE.MeshStandardMaterial({
    color: 0x8b4513,
    roughness: 0.95,
    metalness: 0.05,
    flatShading: true
  });
  const terrain = new THREE.Mesh(terrainGeo, terrainMat);
  terrain.receiveShadow = true;
  scene.add(terrain);

  // ─── PROCEDURAL ROCKS ────────────────────────────────────────
  const rockGeo = new THREE.DodecahedronGeometry(1, 0);
  const rockMat = new THREE.MeshStandardMaterial({ color: 0x5a3a2a, roughness: 1, flatShading: true });
  for (let i = 0; i < 120; i++) {
    const rock = new THREE.Mesh(rockGeo, rockMat);
    const rx = (Math.random() - 0.5) * 400;
    const rz = (Math.random() - 0.5) * 400;
    if (Math.sqrt(rx*rx + rz*rz) < 45) continue;
    const s = 0.3 + Math.random() * 1.8;
    rock.scale.set(s, s * (0.4 + Math.random() * 0.6), s);
    rock.position.set(rx, s * 0.2, rz);
    rock.rotation.set(Math.random(), Math.random(), Math.random());
    rock.castShadow = true;
    rock.receiveShadow = true;
    scene.add(rock);
  }

  // ─── HELPER: get terrain height at (x,z) ─────────────────────
  const raycaster = new THREE.Raycaster();
  function getTerrainY(x, z) {
    raycaster.set(new THREE.Vector3(x, 50, z), new THREE.Vector3(0, -1, 0));
    const hits = raycaster.intersectObject(terrain);
    return hits.length > 0 ? hits[0].point.y : 0;
  }

  // ─── COLONY STRUCTURES ───────────────────────────────────────
  const modules = [];

  function addModule(name, mesh, x, z, lightColor) {
    const ty = getTerrainY(x, z);
    mesh.position.set(x, ty, z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);
    let pl = null;
    if (lightColor) {
      pl = new THREE.PointLight(lightColor, 1.2, 30);
      pl.position.set(x, ty + 4, z);
      scene.add(pl);
    }
    const mod = { name, mesh, pointLight: pl, lightColor, health: 1.0, x, z };
    modules.push(mod);
    return mesh;
  }

  // Central Hab — half sphere dome
  (function() {
    const geo = new THREE.SphereGeometry(8, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
    const mat = new THREE.MeshStandardMaterial({
      color: 0xccddff, emissive: 0x223366, emissiveIntensity: 0.4,
      roughness: 0.3, metalness: 0.4
    });
    const hab = new THREE.Mesh(geo, mat);
    addModule('HAB-CENTRAL', hab, 0, 0, 0x4488ff);
    // base ring
    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(8.2, 0.3, 8, 32),
      new THREE.MeshStandardMaterial({ color: 0x556677, metalness: 0.8 })
    );
    ring.rotation.x = -Math.PI / 2;
    ring.position.set(0, getTerrainY(0, 0) + 0.1, 0);
    scene.add(ring);
  })();

  // Solar Arrays — 6 panels south of hab
  const solarPanels = [];
  (function() {
    const panelMat = new THREE.MeshStandardMaterial({
      color: 0x1a3a6a, metalness: 0.7, roughness: 0.2, emissive: 0x0a1530, emissiveIntensity: 0.2
    });
    for (let i = 0; i < 6; i++) {
      const grp = new THREE.Group();
      const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.15, 0.15, 3, 6),
        new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.9 })
      );
      pole.position.y = 1.5;
      grp.add(pole);

      const panel = new THREE.Mesh(new THREE.BoxGeometry(4, 0.1, 2.5), panelMat);
      panel.position.y = 3.2;
      panel.rotation.x = -0.4;
      panel.castShadow = true;
      grp.add(panel);

      const px = -12 + (i % 3) * 6;
      const pz = 18 + Math.floor(i / 3) * 5;
      const ty = getTerrainY(px, pz);
      grp.position.set(px, ty, pz);
      scene.add(grp);
      solarPanels.push(grp);
    }
    modules.push({ name: 'SOLAR-ARRAY', mesh: solarPanels[0], pointLight: null, lightColor: null, health: 1.0, x: -6, z: 20 });
  })();

  // ISRU Plant — box + chimney
  (function() {
    const grp = new THREE.Group();
    const body = new THREE.Mesh(
      new THREE.BoxGeometry(6, 4, 5),
      new THREE.MeshStandardMaterial({ color: 0x556666, roughness: 0.7, metalness: 0.5 })
    );
    body.position.y = 2;
    body.castShadow = true;
    grp.add(body);
    const chimney = new THREE.Mesh(
      new THREE.CylinderGeometry(0.6, 0.8, 5, 8),
      new THREE.MeshStandardMaterial({ color: 0x667777, metalness: 0.6 })
    );
    chimney.position.set(2, 5.5, 1);
    chimney.castShadow = true;
    grp.add(chimney);
    const px = 20, pz = 5;
    const ty = getTerrainY(px, pz);
    grp.position.set(px, ty, pz);
    scene.add(grp);
    const isruLight = new THREE.PointLight(0x00cccc, 1.5, 20);
    isruLight.position.set(px, ty + 3, pz);
    scene.add(isruLight);
    modules.push({ name: 'ISRU-PLANT', mesh: grp, pointLight: isruLight, lightColor: 0x00cccc, health: 1.0, x: px, z: pz });
  })();

  // Greenhouse Domes x2
  const greenhouses = [];
  (function() {
    const ghMat = new THREE.MeshStandardMaterial({
      color: 0x44cc66, transparent: true, opacity: 0.4,
      emissive: 0x22aa44, emissiveIntensity: 0.3, side: THREE.DoubleSide, roughness: 0.1
    });
    [[-15, -10], [-8, -16]].forEach(([gx, gz]) => {
      const dome = new THREE.Mesh(new THREE.SphereGeometry(4, 24, 12, 0, Math.PI*2, 0, Math.PI/2), ghMat);
      const ty = getTerrainY(gx, gz);
      dome.position.set(gx, ty, gz);
      dome.castShadow = true;
      scene.add(dome);
      const ghLight = new THREE.PointLight(0x44cc66, 0.8, 15);
      ghLight.position.set(gx, ty + 3, gz);
      scene.add(ghLight);
      greenhouses.push(dome);
      modules.push({ name: 'GREENHOUSE', mesh: dome, pointLight: ghLight, lightColor: 0x44cc66, health: 1.0, x: gx, z: gz });
    });
  })();

  // Water Extractor — drilling rig north
  (function() {
    const grp = new THREE.Group();
    const base = new THREE.Mesh(
      new THREE.BoxGeometry(3, 1, 3),
      new THREE.MeshStandardMaterial({ color: 0x667788, metalness: 0.6 })
    );
    base.position.y = 0.5;
    grp.add(base);
    const drill = new THREE.Mesh(
      new THREE.CylinderGeometry(0.2, 0.4, 8, 8),
      new THREE.MeshStandardMaterial({ color: 0x889999, metalness: 0.8 })
    );
    drill.position.y = 4.5;
    drill.castShadow = true;
    grp.add(drill);
    const arm = new THREE.Mesh(
      new THREE.BoxGeometry(5, 0.3, 0.3),
      new THREE.MeshStandardMaterial({ color: 0x778899, metalness: 0.7 })
    );
    arm.position.set(0, 7, 0);
    arm.rotation.z = 0.3;
    grp.add(arm);
    const px = 5, pz = -25;
    const ty = getTerrainY(px, pz);
    grp.position.set(px, ty, pz);
    scene.add(grp);

    // ice patch
    const ice = new THREE.Mesh(
      new THREE.CircleGeometry(8, 24),
      new THREE.MeshStandardMaterial({ color: 0xaaccdd, roughness: 0.3, metalness: 0.1, transparent: true, opacity: 0.4 })
    );
    ice.rotation.x = -Math.PI / 2;
    ice.position.set(px, ty + 0.05, pz);
    scene.add(ice);

    const waterLight = new THREE.PointLight(0x2299ff, 1.2, 20);
    waterLight.position.set(px, ty + 5, pz);
    scene.add(waterLight);
    modules.push({ name: 'WATER-EXTRACT', mesh: grp, pointLight: waterLight, lightColor: 0x2299ff, health: 1.0, x: px, z: pz });
  })();

  // Repair Bay — open box
  (function() {
    const grp = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({ color: 0x887766, roughness: 0.8, metalness: 0.3 });
    function addBox(w,h,d,x,y,z){ const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat); m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true; grp.add(m); }
    addBox(8,0.2,6, 0,0.1,0);   // floor
    addBox(8,4,0.2, 0,2,-3);    // back wall
    addBox(0.2,4,6, -4,2,0);    // left wall
    addBox(0.2,4,6, 4,2,0);     // right wall
    addBox(8,0.15,6, 0,4,0);    // roof

    const px = -22, pz = 8;
    const ty = getTerrainY(px, pz);
    grp.position.set(px, ty, pz);
    scene.add(grp);
    const repairLight = new THREE.PointLight(0xff8833, 1.0, 18);
    repairLight.position.set(px, ty + 3, pz);
    scene.add(repairLight);
    modules.push({ name: 'REPAIR-BAY', mesh: grp, pointLight: repairLight, lightColor: 0xff8833, health: 1.0, x: px, z: pz });
  })();

  // Landing Pad — flat circle west
  const padLights = [];
  (function() {
    const px = -40, pz = -5;
    const ty = getTerrainY(px, pz);
    const pad = new THREE.Mesh(
      new THREE.CircleGeometry(12, 48),
      new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.9, metalness: 0.2 })
    );
    pad.rotation.x = -Math.PI / 2;
    pad.position.set(px, ty + 0.1, pz);
    pad.receiveShadow = true;
    scene.add(pad);

    // ring marking
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(9, 10, 48),
      new THREE.MeshStandardMaterial({ color: 0xcc8800, emissive: 0x664400, emissiveIntensity: 0.3 })
    );
    ring.rotation.x = -Math.PI / 2;
    ring.position.set(px, ty + 0.15, pz);
    scene.add(ring);

    // inner ring

  // ─── CAMERA SYSTEM ───────────────────────────────────────────

    const offset = new THREE.Vector3(
      Math.sin(rtsAngle) * rtsHeight * Math.cos(rtsPitch),
      rtsHeight * Math.sin(rtsPitch),
      Math.cos(rtsAngle) * rtsHeight * Math.cos(rtsPitch)

  let transEndPos = new THREE.Vector3();

  const keys = {};

    if (e.key === 'f' || e.key === 'F') toggleFullscreen();

      const speeds = [0.5, 1, 3, 10, 50];

        solSpeed = speeds[idx + 1];

  }, { passive: true });

  window.addEventListener('mousedown', e => {

    if (e.button === 2 && cameraMode === 'fps') { e.preventDefault(); exitFPS(); }
  });
  window.addEventListener('mouseup', e => {
    if (e.button === 1) middleDragging = false;
  });
  window.addEventListener('mousemove', e => {

      rtsAngle += (e.clientX - middleLastX) * 0.005;
      middleLastX = e.clientX;
    }

    if (cameraMode !== 'rts') return;
    clickMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    clickMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    clickRay.setFromCamera(clickMouse, camera);

    // Check intersection with unit meshes
    const unitMeshes = [];
    units.forEach(u => {
      u.group.traverse(child => {
        if (child.isMesh) unitMeshes.push({ mesh: child, unit: u });
      });
    });
    const meshes = unitMeshes.map(um => um.mesh);
    const intersects = clickRay.intersectObjects(meshes, false);
    if (intersects.length > 0) {
      const hitMesh = intersects[0].object;
      const found = unitMeshes.find(um => um.mesh === hitMesh);
      if (found) enterFPS(found.unit);
    }

  function enterFPS(unit) {

    transEndPos.set(unitPos.x, unitPos.y + 2, unitPos.z);

    // Face unit's direction

    const tmpCam = camera.clone();
    tmpCam.position.copy(transEndPos);
    tmpCam.lookAt(transEndPos.x + dir.x, transEndPos.y, transEndPos.z + dir.z);

    transEndPos.copy(rtsTarget).add(offset);

  function advanceSol(dt) {
    solHour += dt * solSpeed * (SOL_HOURS / 25); // ~25s per sol at 1×
    if (solHour >= SOL_HOURS) {
      solHour -= SOL_HOURS;

      simState.wind_ms = m.wind_ms || 7;

  function onNewSol() {
    if (!frameData) return;

    // Show hazards
    if (frameData.hazards && currentSol !== lastEventSol) {
      lastEventSol = currentSol;
      frameData.hazards.forEach(h => {
        if (h.probability && h.probability < 0.005) return; // skip trivial
        const name = h.type.replace(/_/g, ' ').toUpperCase();
        showToast(`⚠️ Sol ${currentSol}: ${name}${h.target ? ' → ' + h.target.replace(/_/g, ' ') : ''}`, 'hazard');
        // Dispatch nearest idle unit to the affected building
        if (h.target && TASK_TARGETS[h.target]) {
          assignUnitToTarget(h.target);
        }
      });
    }

    // Show events
    if (frameData.events) {
      frameData.events.forEach(e => {
        const name = e.type.replace(/_/g, ' ').toUpperCase();
        showToast(`📋 Sol ${currentSol}: ${name}`, 'event');
      });
    }

    // Show challenge
    if (frameData.challenge) {
      const c = frameData.challenge;
      showToast(`🎯 CHALLENGE: ${c.type.replace(/_/g, ' ').toUpperCase()}`, 'hazard');
    }
  }

  // Assign the nearest idle unit to go investigate a building
  function assignUnitToTarget(targetKey) {
    const target = TASK_TARGETS[targetKey];
    if (!target) return;
    let bestUnit = null, bestDist = Infinity;
    units.forEach(u => {
      if (u.task) return; // already on a task
      const dx = u.group.position.x - target.x;
      const dz = u.group.position.z - target.z;
      const dist = dx * dx + dz * dz;
      if (dist < bestDist) { bestDist = dist; bestUnit = u; }
    });
    if (bestUnit) {
      bestUnit.task = { target: targetKey, x: target.x, z: target.z, duration: 8 + Math.random() * 12, timer: 0 };
      showToast(`🤖 ${bestUnit.name} → ${targetKey.replace(/_/g, ' ').toUpperCase()}`, 'info');
    }
  }

  // ─── DAY/NIGHT CYCLE ────────────────────────────────────────
  function updateDayNight() {
    const hourFrac = solHour / SOL_HOURS; // 0..1
    // Sun position: rises at ~0.25, sets at ~0.75
    const sunAngle = (hourFrac - 0.25) * Math.PI * 2;
    const sunY = Math.sin(sunAngle);
    const sunX = Math.cos(sunAngle) * 0.5;

    // Sun position
    sunLight.position.set(sunX * 120, Math.max(sunY * 120, -20), 60);

    // Intensity based on elevation
    const dayFactor = Math.max(0, Math.min(1, sunY * 2 + 0.3));
    sunLight.intensity = 0.3 + dayFactor * 1.5;

    // Color: warm orange at dawn/dusk, pale at noon
    const dawnDusk = 1 - Math.abs(hourFrac - 0.5) * 4; // peaks at 0.25 and 0.75
    const warmth = Math.max(0, dawnDusk);
    sunLight.color.setRGB(
      1,
      0.65 + warmth * 0.1,
      0.35 + dayFactor * 0.3 - warmth * 0.15
    );

    // Ambient: darker at night
    ambientLight.intensity = 0.08 + dayFactor * 0.3;
    hemiLight.intensity = 0.05 + dayFactor * 0.25;

    // Sky/background: Mars red-dark to deep black
    const bgR = 0.08 + dayFactor * 0.07;
    const bgG = 0.03 + dayFactor * 0.02;
    const bgB = 0.01 + dayFactor * 0.02;
    scene.background.setRGB(bgR, bgG, bgB);

    // Fog color follows sky
    scene.fog.color.setRGB(bgR * 1.2, bgG * 1.1, bgB);

    // Tone mapping exposure
    renderer.toneMappingExposure = 0.5 + dayFactor * 0.7;
  }

  // ─── DUST STORM EFFECTS ─────────────────────────────────────
  function updateDustEffects() {
    const tau = simState.dust_tau || 0.15;
    // Fog density increases with dust
    scene.fog.density = 0.0025 + tau * 0.008;
    // Dust particle opacity
    dustMat.opacity = 0.15 + tau * 0.5;
    dustMat.size = 0.3 + tau * 1.5;
    // Wind speed affects dust movement (stored for anim loop)
    simState._windFactor = (simState.wind_ms || 7) / 7;
  }

  // ─── MODULE HEALTH VISUALIZATION ────────────────────────────
  // Maps frame hazard targets to module names
  const HAZARD_MODULE_MAP = {
    'solar_array': 'SOLAR-ARRAY',
    'isru_unit': 'ISRU-PLANT',
    'greenhouse': 'GREENHOUSE',
    'water_extract': 'WATER-EXTRACT',
    'hab': 'HAB-CENTRAL',
    'comms': 'COMMS-ARRAY',
  };

  function updateModuleHealth(elapsed) {
    // Apply degradation from current frame hazards
    if (frameData && frameData.hazards) {
      frameData.hazards.forEach(h => {
        const modName = HAZARD_MODULE_MAP[h.target];
        if (!modName) return;
        modules.forEach(m => {
          if (m.name === modName) {
            m.health = Math.max(0.2, m.health - (h.degradation || 0.005) * 0.01);
          }
        });
      });
    }

    // Slowly recover health when not under attack
    modules.forEach(m => {
      m.health = Math.min(1.0, m.health + 0.0005);

      // Visual: dim light based on health
      if (m.pointLight) {
        const baseIntensity = m.name === 'COMMS-ARRAY' ? 1.0 :
                              m.name === 'ISRU-PLANT' ? 1.5 : 1.2;
        m.pointLight.intensity = baseIntensity * m.health;

        // Flicker when health is low
        if (m.health < 0.5) {
          const flicker = Math.sin(elapsed * 15 + m.x * 3) > 0.3 ? 1 : 0.3;
          m.pointLight.intensity *= flicker;
        }
      }

      // Mesh emissive dims with health
      if (m.mesh && m.mesh.material && m.mesh.material.emissiveIntensity !== undefined) {
        m.mesh.material.emissiveIntensity = 0.1 + m.health * 0.3;
      }
    });
  }

  // ─── COMMS INTERFERENCE ─────────────────────────────────────
  const commsOverlay = document.getElementById('comms-interference');
  let commsBlackout = false;

  function updateCommsEffects() {
    if (!frameData || !frameData.comms) return;
    const comms = frameData.comms;
    const highDelay = (comms.earth_delay_min || 4) > 10;
    const windowClosed = !comms.window_open;
    const hasBlackoutEvent = frameData.events &&
      frameData.events.some(e => e.type === 'comms_blackout' || e.type === 'solar_conjunction');

    const shouldBlackout = hasBlackoutEvent || (highDelay && windowClosed);

    if (shouldBlackout && !commsBlackout) {
      commsBlackout = true;
      commsOverlay.classList.add('active');
      document.getElementById('conn-dot').textContent = '📡';
    } else if (!shouldBlackout && commsBlackout) {
      commsBlackout = false;
      commsOverlay.classList.remove('active');
    }
  }

  // ─── RADIATION EFFECTS ──────────────────────────────────────
  const radiationOverlay = document.getElementById('radiation-overlay');

  function updateRadiationEffects() {
    if (!frameData || !frameData.terrain) return;
    const rad = frameData.terrain.surface_radiation_usv || 0.5;
    // Radiation above 0.7 starts showing purple vignette
    if (rad > 0.7) {
      const intensity = Math.min(1, (rad - 0.7) * 3);
      radiationOverlay.style.opacity = intensity * 0.6;
    } else {
      radiationOverlay.style.opacity = '0';
    }
  }

  // ─── TERRAIN TEMPERATURE TINTING ────────────────────────────
  function updateTerrainTint() {
    const temp = simState.temp_c || -47;
    // Colder → bluer/whiter, warmer → redder
    if (temp < -60) {
      // Deep cold: frost tint
      const frost = Math.min(1, (-60 - temp) / 30);
      terrainMat.color.setRGB(
        0.55 - frost * 0.1,
        0.27 + frost * 0.15,
        0.08 + frost * 0.25
      );
    } else if (temp > -30) {
      // Warm: reddish
      const warm = Math.min(1, (temp + 30) / 20);
      terrainMat.color.setRGB(
        0.55 + warm * 0.15,
        0.27 - warm * 0.05,
        0.08
      );
    } else {
      // Normal Mars brown
      terrainMat.color.setRGB(0.55, 0.27, 0.08);
    }
  }

  // ─── SUPPLY SHIP ───────────────────────────────────────────
  let supplyShip = null;
  let supplyShipState = 'gone'; // 'gone' | 'approaching' | 'landed' | 'departing'
  let supplyShipTimer = 0;

  (function createSupplyShip() {
    const grp = new THREE.Group();
    // Capsule body
    const body = new THREE.Mesh(
      new THREE.CylinderGeometry(1.5, 2, 8, 8),
      new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.7, roughness: 0.3 })
    );
    body.castShadow = true;
    grp.add(body);
    // Nose cone
    const nose = new THREE.Mesh(
      new THREE.ConeGeometry(1.5, 3, 8),
      new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.6 })
    );
    nose.position.y = 5.5;
    grp.add(nose);
    // Engine glow
    const engine = new THREE.PointLight(0xff4400, 2, 30);
    engine.position.y = -5;
    grp.add(engine);
    grp.visible = false;
    grp.position.set(-40, 100, -5); // above landing pad
    scene.add(grp);
    supplyShip = { group: grp, engine };
  })();

  function updateSupplyShip(dt) {
    if (!frameData) return;

    // Trigger landing during comms windows (supply arrives!)
    const commsOpen = frameData.comms && frameData.comms.window_open;
    if (commsOpen && supplyShipState === 'gone' && Math.random() < 0.002) {
      supplyShipState = 'approaching';
      supplyShipTimer = 0;
      supplyShip.group.visible = true;
      supplyShip.group.position.set(-40, 120, -5);
      showToast('🚀 SUPPLY SHIP INCOMING', 'event');
    }

    supplyShipTimer += dt;

    if (supplyShipState === 'approaching') {
      const t = Math.min(1, supplyShipTimer / 8);
      const ease = t * t * (3 - 2 * t);
      const padY = getTerrainY(-40, -5);
      supplyShip.group.position.y = 120 - (120 - padY - 5) * ease;
      supplyShip.engine.intensity = 2 + Math.sin(supplyShipTimer * 10) * 0.5;
      if (t >= 1) {
        supplyShipState = 'landed';
        supplyShipTimer = 0;
        supplyShip.engine.intensity = 0;
        showToast('📦 Supply ship landed — unloading cargo', 'info');
      }
    } else if (supplyShipState === 'landed') {
      if (supplyShipTimer > 15) {
        supplyShipState = 'departing';
        supplyShipTimer = 0;
        showToast('🚀 Supply ship departing', 'event');
      }
    } else if (supplyShipState === 'departing') {
      const t = Math.min(1, supplyShipTimer / 6);
      const padY = getTerrainY(-40, -5);
      supplyShip.group.position.y = padY + 5 + t * t * 150;
      supplyShip.engine.intensity = 3 - t * 2;
      if (t >= 1) {
        supplyShipState = 'gone';
        supplyShip.group.visible = false;
      }
    }
  }

  function updateHUD() {
    const s = twinConnected ? twinState : simState;

    document.getElementById('sol').textContent = String(Math.floor(s.sol || 1)).padStart(3, '0');

    const cri = s.cri != null ? s.cri : 0.3;
    document.getElementById('cri-fill').style.width = (Math.min(cri, 1) * 100) + '%';
    document.getElementById('cri-fill').style.background = cri < 0.5 ? '#4caf50' : cri < 0.75 ? '#ffc107' : '#f44336';
    document.getElementById('cri-val').textContent = (typeof cri === 'number' ? cri : 0.3).toFixed(2);

    document.getElementById('mod-count').textContent = s.modules || 8;
    document.getElementById('crew-alive').textContent = s.crew_alive || 5;
    document.getElementById('pwr-level').textContent = Math.round(s.power || 87);

    function setBar(id, val) {
      document.getElementById('bar-' + id).style.width = val + '%';
      document.getElementById('val-' + id).textContent = Math.round(val) + '%';
    }
    setBar('o2', s.o2 || 82);
    setBar('h2o', s.h2o || 68);
    setBar('food', s.food || 55);
    setBar('pwr', s.power || 87);
  }

  // ─── ANIMATION LOOP ──────────────────────────────────────────
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.1);
    const elapsed = clock.elapsedTime;

    // ── Advance sol clock & environment ──
    advanceSol(dt);
    updateDayNight();
    updateDustEffects();
    updateModuleHealth(elapsed);
    updateCommsEffects();
    updateRadiationEffects();
    updateTerrainTint();
    updateSupplyShip(dt);

    // ── Update units (frame-driven tasks + patrol) ──
    units.forEach((u, ui) => {
      let desiredX, desiredZ;

      // If unit has a task from frame hazard, steer toward target
      if (u.task) {
        u.task.timer += dt;
        desiredX = u.task.x + Math.sin(u.task.timer * 0.5) * 2;
        desiredZ = u.task.z + Math.cos(u.task.timer * 0.5) * 2;
        if (u.task.timer >= u.task.duration) {
          showToast(`✅ ${u.name} completed ${u.task.target.replace(/_/g, ' ')} task`, 'info');
          u.task = null;
        }
      } else {
        // Normal patrol
        const wp = u.waypoints;
        u.progress += dt * u.speed * 0.15;
        if (u.progress >= 1) {
          u.progress -= 1;
          u.waypointIndex = (u.waypointIndex + 1) % wp.length;
        }
        const ci = u.waypointIndex;
        const ni = (ci + 1) % wp.length;
        const t = u.progress;
        const st = t * t * (3 - 2 * t);
        desiredX = wp[ci][0] + (wp[ni][0] - wp[ci][0]) * st;
        desiredZ = wp[ci][1] + (wp[ni][1] - wp[ci][1]) * st;
      }

      // ── Soft collision avoidance ──
      let pushX = 0, pushZ = 0;

      for (const ob of obstacles) {
        const dx = desiredX - ob.x;
        const dz = desiredZ - ob.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        const minDist = ob.r + UNIT_RADIUS;
        if (dist < minDist && dist > 0.01) {
          const penetration = (minDist - dist) / minDist;
          const force = penetration * penetration * BUILDING_PUSH;
          pushX += (dx / dist) * force;
          pushZ += (dz / dist) * force;
        }
      }

      for (let j = 0; j < units.length; j++) {
        if (j === ui) continue;
        const other = units[j];
        const dx = desiredX - other.group.position.x;
        const dz = desiredZ - other.group.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        const minDist = UNIT_RADIUS * 3;
        if (dist < minDist && dist > 0.01) {
          const penetration = (minDist - dist) / minDist;
          const force = penetration * penetration * UNIT_PUSH;
          pushX += (dx / dist) * force;
          pushZ += (dz / dist) * force;
        }
      }

      const goalX = desiredX + pushX;
      const goalZ = desiredZ + pushZ;

      const lerpFactor = 1 - Math.pow(0.001, dt);
      const prevX = u.group.position.x;
      const prevZ = u.group.position.z;
      const finalX = prevX + (goalX - prevX) * lerpFactor;
      const finalZ = prevZ + (goalZ - prevZ) * lerpFactor;
      const ty = getTerrainY(finalX, finalZ);
      u.group.position.set(finalX, ty, finalZ);

      // Smooth rotation
      const moveX = finalX - prevX;
      const moveZ = finalZ - prevZ;
      if (moveX * moveX + moveZ * moveZ > 0.0001) {
        const targetAngle = Math.atan2(moveX, moveZ);
        let angleDiff = targetAngle - u.group.rotation.y;
        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
        u.group.rotation.y += angleDiff * Math.min(dt * 4, 1);
      }
      u.direction.set(Math.sin(u.group.rotation.y), 0, Math.cos(u.group.rotation.y));

      // Bob
      u.group.position.y = ty + Math.sin(elapsed * 3 + ui) * 0.08;

      // Status light: flash during high CRI, amber when on task
      const cri = simState.cri || 0.3;
      if (cri > 0.6) {
        u.statusLight.color.setHex(Math.sin(elapsed * 5) > 0 ? 0xff4444 : 0xffaa00);
      } else {
        u.statusLight.color.setHex(u.task ? 0xffaa00 : 0x44ff88);
      }

      // Label with task indicator
      const screenPos = u.group.position.clone();
      screenPos.y += 3;
      screenPos.project(camera);
      if (screenPos.z < 1 && cameraMode !== 'fps') {
        u.label.style.display = 'block';
        u.label.style.left = ((screenPos.x + 1) / 2 * window.innerWidth) + 'px';
        u.label.style.top = ((-screenPos.y + 1) / 2 * window.innerHeight) + 'px';
        u.label.textContent = u.name + (u.task ? ' 🔧' : '');
      } else {
        u.label.style.display = 'none';
      }
    });

    // ── Dust (wind-driven from frame data) ──
    const windFactor = simState._windFactor || 1;
    const dPos = dust.geometry.attributes.position;
    for (let i = 0; i < dustCount; i++) {
      let x = dPos.getX(i) + dt * 3 * windFactor;
      let z = dPos.getZ(i) + dt * 1 * windFactor;
      if (x > 150) x -= 300;
      if (z > 150) z -= 300;
      dPos.setX(i, x);
      dPos.setZ(i, z);
    }
    dPos.needsUpdate = true;

    // ── Greenhouse pulse ──
    greenhouses.forEach((gh, i) => {
      const s = 1 + Math.sin(elapsed * 1.5 + i * 1.5) * 0.03;
      gh.scale.set(s, s, s);
    });

    // ── Solar panel tracking ──
    solarPanels.forEach(sp => {
      if (sp.children[1]) {
        sp.children[1].rotation.x = -0.4 + Math.sin(elapsed * 0.1) * 0.15;
      }
    });

    // ── Landing pad blink ──
    padLights.forEach(pl => {
      const blink = Math.sin(elapsed * 3 + pl.phase * 0.8) > 0.3;
      pl.light.intensity = blink ? 1.2 : 0.1;
    });

    // ── Comms dish rotation (slowly tracks) ──
    const commsModule = modules.find(m => m.name === 'COMMS-ARRAY');
    if (commsModule && commsModule.mesh.userData.dish) {
      commsModule.mesh.userData.dish.rotation.y = Math.sin(elapsed * 0.08) * 0.5;
      commsModule.mesh.userData.dish.rotation.z = Math.PI + Math.sin(elapsed * 0.05) * 0.15;
    }

    // ── ISRU chimney smoke ──
    const sPos = smoke.geometry.attributes.position;
    const isruHealth = (modules.find(m => m.name === 'ISRU-PLANT') || {}).health || 1;
    smokeMat.opacity = 0.1 + isruHealth * 0.15;
    for (let i = 0; i < smokeCount; i++) {
      let y = sPos.getY(i) + dt * (2 + Math.sin(i) * 0.5);
      let x = sPos.getX(i) + dt * (simState._windFactor || 1) * 0.3;
      if (y > 22) { y = 8 + Math.random() * 2; x = 22 + (Math.random() - 0.5) * 1.5; }
      sPos.setX(i, x);
      sPos.setY(i, y);
    }
    sPos.needsUpdate = true;

    // ── Stars twinkle + fade with daylight ──
    const dayFrac = Math.max(0, Math.min(1, Math.sin((solHour / SOL_HOURS - 0.25) * Math.PI * 2) * 2 + 0.3));
    starMat.opacity = Math.max(0, 0.8 - dayFrac * 0.7);
    // Slowly rotate starfield
    stars.rotation.y = elapsed * 0.001;

    // ── Camera ──
    if (cameraMode === 'rts') {
      const panSpeed = rtsHeight * 0.6 * dt;
      const forward = new THREE.Vector3(-Math.sin(rtsAngle), 0, -Math.cos(rtsAngle));
      const right = new THREE.Vector3(Math.cos(rtsAngle), 0, -Math.sin(rtsAngle));

      if (keys['w'] || keys['arrowup']) rtsTarget.addScaledVector(forward, panSpeed);
      if (keys['s'] || keys['arrowdown']) rtsTarget.addScaledVector(forward, -panSpeed);
      if (keys['a'] || keys['arrowleft']) rtsTarget.addScaledVector(right, -panSpeed);
      if (keys['d'] || keys['arrowright']) rtsTarget.addScaledVector(right, panSpeed);

      // Clamp target
      rtsTarget.x = Math.max(-200, Math.min(200, rtsTarget.x));
      rtsTarget.z = Math.max(-200, Math.min(200, rtsTarget.z));
      rtsTarget.y = getTerrainY(rtsTarget.x, rtsTarget.z);

      updateRTSCamera();
    }
    else if (cameraMode === 'transition_fps' || cameraMode === 'transition_rts') {
      const now = performance.now() / 1000;
      let t = Math.min(1, (now - transitionStart) / transitionDuration);
      // ease in-out
      t = t * t * (3 - 2 * t);

      camera.position.lerpVectors(transStartPos, transEndPos, t);
      camera.quaternion.slerpQuaternions(transStartQuat, transEndQuat, t);

      // During fps transition, update end target to track unit
      if (cameraMode === 'transition_fps' && fpsUnit) {
        const up = fpsUnit.group.position;
        transEndPos.set(up.x, up.y + 2, up.z);
      }

      if (t >= 1) {
        if (cameraMode === 'transition_fps') {
          cameraMode = 'fps';
          renderer.domElement.requestPointerLock();
        } else {
          cameraMode = 'rts';
        }
      }
    }
    else if (cameraMode === 'fps' && fpsUnit) {
      const up = fpsUnit.group.position;
      camera.position.set(up.x, up.y + 2, up.z);

      // Apply yaw/pitch
      const euler = new THREE.Euler(fpsPitch, fpsYaw, 0, 'YXZ');
      camera.quaternion.setFromEuler(euler);
    }

    // ── HUD ──
    updateHUD();
    if (fpsUnit) updateFPSHP();

    renderer.render(scene, camera);
  }

  animate();

  // ─── RESIZE ──────────────────────────────────────────────────
  function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }
  window.addEventListener('resize', onResize);
  document.addEventListener('fullscreenchange', onResize);

  // Hide fullscreen hint after 5s
  setTimeout(() => {
    const hint = document.getElementById('fs-hint');
    if (hint) hint.style.transition = 'opacity 1s';
    if (hint) hint.style.opacity = '0';
    setTimeout(() => { if (hint) hint.style.display = 'none'; }, 1000);
  }, 5000);

  // Pointer lock change
  document.addEventListener('pointerlockchange', () => {
    if (!document.pointerLockElement && cameraMode === 'fps') {
      exitFPS();
    }
  });

})();
</script>
</body>
</html>
