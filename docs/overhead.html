<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mars Colony — Overhead View</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f;font-family:'Courier New',monospace;color:#c9d1d9}
canvas{display:block;width:100%;height:100%;cursor:crosshair}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#ui>*{pointer-events:auto}
#overlay-bar{position:absolute;top:8px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10}
.ovl-btn{background:#161b22;border:1px solid #30363d;color:#8b949e;padding:4px 10px;font-size:11px;font-family:'Courier New',monospace;cursor:pointer;border-radius:3px;user-select:none;transition:all .2s}
.ovl-btn:hover{border-color:#58a6ff;color:#58a6ff}
.ovl-btn.active{background:#1f2937;border-color:#58a6ff;color:#58a6ff;box-shadow:0 0 6px rgba(88,166,255,.3)}
#conn-status{position:absolute;top:10px;right:10px;font-size:11px;padding:3px 8px;background:#161b22;border:1px solid #30363d;border-radius:3px}
#tooltip{position:absolute;display:none;background:rgba(13,17,23,.92);border:1px solid #58a6ff;padding:8px 12px;font-size:11px;border-radius:4px;pointer-events:none;z-index:20;max-width:220px;box-shadow:0 0 12px rgba(88,166,255,.2)}
#tooltip .tt-title{color:#58a6ff;font-weight:bold;margin-bottom:4px;font-size:12px}
#tooltip .tt-row{color:#8b949e;line-height:1.5}
#tooltip .tt-row span{color:#c9d1d9}
#scanlines{position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:50}
#help-hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:10px;color:#484f58;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="overlay-bar">
    <button class="ovl-btn active" data-ov="power" title="1">⚡ Power</button>
    <button class="ovl-btn" data-ov="o2" title="2">🫁 O₂</button>
    <button class="ovl-btn" data-ov="water" title="3">💧 H₂O</button>
    <button class="ovl-btn" data-ov="thermal" title="4">🌡 Thermal</button>
    <button class="ovl-btn" data-ov="hazard" title="5">☢ Hazards</button>
  </div>
  <div id="conn-status">🔴 STANDALONE</div>
  <div id="tooltip"><div class="tt-title"></div><div class="tt-body"></div></div>
  <div id="scanlines"></div>
  <div id="help-hint">DRAG pan · SCROLL zoom · CLICK module · 1-5 overlays · SPACE pause</div>
</div>
<script>
// ─── CANVAS SETUP ───────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

// ─── CAMERA ─────────────────────────────────────────────────────────
const cam = { x: 0, y: 0, zoom: 2.8, targetZoom: 2.8 };
function worldToScreen(wx, wy) {
  return [(wx - cam.x) * cam.zoom + W / 2, (wy - cam.y) * cam.zoom + H / 2];
}
function screenToWorld(sx, sy) {
  return [(sx - W / 2) / cam.zoom + cam.x, (sy - H / 2) / cam.zoom + cam.y];
}

// ─── STATE ──────────────────────────────────────────────────────────
let paused = false;
let twinConnected = false;
let lastTwinUpdate = 0;
const overlays = { power: true, o2: false, water: false, thermal: false, hazard: false };
let selectedModule = null;
let hoveredCrew = null;
let mouseWorld = [0, 0];
let mouseScreen = [0, 0];

// ─── SIMULATED COLONY STATE ─────────────────────────────────────────
const state = {
  sol: 47, hour: 10.5, cri: 72,
  weather: { temp: -42, dust: 0.15, windDir: 135, windSpeed: 12, solarFlux: 0.82, dustStorm: false },
  resources: { power: 78, o2: 85, h2o: 63, food: 91 },
  modules: {},
  crew: []
};

// ─── MODULE DEFINITIONS ─────────────────────────────────────────────
const moduleDefs = [
  { id: 'hab',       name: 'Central Hab',      icon: '🏠', x: 0,    y: 0,    w: 28, h: 28, shape: 'rect',   color: '#58a6ff', hp: 94 },
  { id: 'solar1',    name: 'Solar Array α',    icon: '☀️', x: -35,  y: 50,   w: 30, h: 10, shape: 'rect',   color: '#e3b341', hp: 88 },
  { id: 'solar2',    name: 'Solar Array β',    icon: '☀️', x: 0,    y: 55,   w: 30, h: 10, shape: 'rect',   color: '#e3b341', hp: 91 },
  { id: 'solar3',    name: 'Solar Array γ',    icon: '☀️', x: 35,   y: 50,   w: 30, h: 10, shape: 'rect',   color: '#e3b341', hp: 85 },
  { id: 'isru',      name: 'ISRU Plant',       icon: '⚙️', x: 30,   y: -15,  w: 20, h: 18, shape: 'rect',   color: '#39d2e0', hp: 79 },
  { id: 'greenhouse',name: 'Greenhouse Dome',  icon: '🌱', x: -30,  y: -25,  w: 22, h: 22, shape: 'circle', color: '#3fb950', hp: 96 },
  { id: 'water',     name: 'Water Extractor',  icon: '💧', x: 15,   y: -55,  w: 16, h: 16, shape: 'rect',   color: '#58a6ff', hp: 82 },
  { id: 'repair',    name: 'Repair Bay',       icon: '🔧', x: -20,  y: 12,   w: 14, h: 14, shape: 'rect',   color: '#f0883e', hp: 100 },
  { id: 'comms',     name: 'Comms Array',      icon: '📡', x: 60,   y: -40,  w: 12, h: 12, shape: 'circle', color: '#bc8cff', hp: 90 },
  { id: 'landing',   name: 'Landing Pad',      icon: '🚀', x: -65,  y: 10,   w: 32, h: 32, shape: 'rect',   color: '#8b949e', hp: 100 }
];
moduleDefs.forEach(m => { state.modules[m.id] = { ...m, powered: true }; });

// ─── CREW ───────────────────────────────────────────────────────────
const crewDefs = [
  { name: 'Cmdr. Torres', color: '#58a6ff', hp: 92, status: 'Monitoring systems' },
  { name: 'Dr. Okafor',   color: '#3fb950', hp: 88, status: 'Greenhouse check' },
  { name: 'Eng. Vasquez', color: '#f0883e', hp: 75, status: 'ISRU maintenance' },
  { name: 'Sci. Nakamura',color: '#bc8cff', hp: 95, status: 'Soil analysis' },
  { name: 'Med. Chen',    color: '#da3633', hp: 100,status: 'Crew health scan' },
  { name: 'Plt. Johansson',color:'#e3b341', hp: 84, status: 'EVA prep' }
];
crewDefs.forEach((c, i) => {
  const target = moduleDefs[i % moduleDefs.length];
  state.crew.push({
    ...c, x: target.x + (Math.random() - 0.5) * 10, y: target.y + (Math.random() - 0.5) * 10,
    tx: target.x, ty: target.y, speed: 0.3 + Math.random() * 0.2, patrolTimer: Math.random() * 200
  });
});

// ─── CONNECTION LINES ───────────────────────────────────────────────
const powerLines = [['solar1','hab'],['solar2','hab'],['solar3','hab'],['hab','isru'],['hab','greenhouse'],['hab','water'],['hab','comms'],['hab','repair']];
const o2Lines = [['isru','hab'],['hab','greenhouse'],['greenhouse','hab']];
const waterLines = [['water','hab'],['hab','greenhouse'],['hab','isru']];

// ─── PROCEDURAL TERRAIN ─────────────────────────────────────────────
function seededRandom(seed) { let s = seed; return () => { s = (s * 16807 + 0) % 2147483647; return s / 2147483647; }; }
const terrainRng = seededRandom(42);
const craters = [];
for (let i = 0; i < 30; i++) craters.push({ x: (terrainRng() - 0.5) * 400, y: (terrainRng() - 0.5) * 400, r: 3 + terrainRng() * 18 });
const rocks = [];
for (let i = 0; i < 60; i++) rocks.push({ x: (terrainRng() - 0.5) * 400, y: (terrainRng() - 0.5) * 400, r: 1 + terrainRng() * 4, rot: terrainRng() * Math.PI * 2 });

// ─── DUST PARTICLES ─────────────────────────────────────────────────
const dustParticles = [];
for (let i = 0; i < 120; i++) dustParticles.push({ x: (Math.random() - 0.5) * 500, y: (Math.random() - 0.5) * 500, s: 0.5 + Math.random() * 1.5, a: 0.1 + Math.random() * 0.3 });

// ─── RESOURCE FLOW DOTS ────────────────────────────────────────────
const flowDots = [];
function initFlowDots() {
  flowDots.length = 0;
  const allLines = [...(overlays.power ? powerLines : []), ...(overlays.o2 ? o2Lines : []), ...(overlays.water ? waterLines : [])];
  allLines.forEach(([from, to]) => {
    for (let i = 0; i < 3; i++) flowDots.push({ from, to, t: Math.random(), speed: 0.003 + Math.random() * 0.004 });
  });
}
initFlowDots();

// ─── BROADCAST CHANNEL ─────────────────────────────────────────────
let bc;
try {
  bc = new BroadcastChannel('mars-barn-twin');
  bc.onmessage = (ev) => {
    const d = ev.data;
    if (d && typeof d === 'object') {
      twinConnected = true; lastTwinUpdate = performance.now();
      if (d.sol !== undefined) state.sol = d.sol;
      if (d.hour !== undefined) state.hour = d.hour;
      if (d.cri !== undefined) state.cri = d.cri;
      if (d.weather) Object.assign(state.weather, d.weather);
      if (d.resources) Object.assign(state.resources, d.resources);
      if (d.modules) { for (const k in d.modules) { if (state.modules[k]) Object.assign(state.modules[k], d.modules[k]); } }
      if (d.crew && Array.isArray(d.crew)) { d.crew.forEach((c, i) => { if (state.crew[i]) Object.assign(state.crew[i], c); }); }
      document.getElementById('conn-status').innerHTML = '🟢 LIVE';
    }
  };
} catch(e) { /* BroadcastChannel not supported */ }

// ─── SIMULATED TICK (STANDALONE) ────────────────────────────────────
let simTimer = 0;
function simTick(dt) {
  if (twinConnected && performance.now() - lastTwinUpdate < 5000) return;
  if (twinConnected && performance.now() - lastTwinUpdate >= 5000) {
    twinConnected = false;
    document.getElementById('conn-status').innerHTML = '🔴 STANDALONE';
  }
  simTimer += dt;
  if (simTimer > 2) {
    simTimer = 0;
    state.hour += 0.1; if (state.hour >= 24.66) { state.hour = 0; state.sol++; }
    state.resources.power = clamp(state.resources.power + (Math.random() - 0.48) * 3, 5, 100);
    state.resources.o2 = clamp(state.resources.o2 + (Math.random() - 0.45) * 2, 10, 100);
    state.resources.h2o = clamp(state.resources.h2o + (Math.random() - 0.5) * 1.5, 10, 100);
    state.resources.food = clamp(state.resources.food + (Math.random() - 0.52) * 0.5, 5, 100);
    state.weather.temp = -60 + Math.sin(state.hour / 24.66 * Math.PI * 2) * 25 + (Math.random() - 0.5) * 5;
    state.weather.dust = clamp(state.weather.dust + (Math.random() - 0.5) * 0.05, 0, 1);
    state.weather.dustStorm = state.weather.dust > 0.6;
    state.weather.solarFlux = clamp(0.9 - state.weather.dust * 0.5, 0.1, 1);
    state.weather.windSpeed = 5 + Math.random() * 25;
    state.weather.windDir += (Math.random() - 0.5) * 20;
    state.cri = clamp(Math.round(50 + state.resources.power * 0.15 + state.resources.o2 * 0.15 - state.weather.dust * 30), 0, 100);
  }
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ─── UPDATE CREW ────────────────────────────────────────────────────
function updateCrew(dt) {
  state.crew.forEach(c => {
    c.patrolTimer -= dt * 60;
    if (c.patrolTimer <= 0) {
      const t = moduleDefs[Math.floor(Math.random() * moduleDefs.length)];
      c.tx = t.x + (Math.random() - 0.5) * 8;
      c.ty = t.y + (Math.random() - 0.5) * 8;
      c.patrolTimer = 120 + Math.random() * 300;
    }
    const dx = c.tx - c.x, dy = c.ty - c.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 0.5) {
      c.x += (dx / dist) * c.speed * dt * 30;
      c.y += (dy / dist) * c.speed * dt * 30;
    }
  });
}

// ─── UPDATE DUST ────────────────────────────────────────────────────
function updateDust(dt) {
  const windRad = state.weather.windDir * Math.PI / 180;
  const ws = state.weather.windSpeed * 0.15;
  dustParticles.forEach(p => {
    p.x += Math.cos(windRad) * ws * dt * 10;
    p.y += Math.sin(windRad) * ws * dt * 10;
    if (p.x > 250) p.x -= 500; if (p.x < -250) p.x += 500;
    if (p.y > 250) p.y -= 500; if (p.y < -250) p.y += 500;
  });
}

// ─── UPDATE FLOW DOTS ───────────────────────────────────────────────
function updateFlowDots(dt) {
  flowDots.forEach(d => { d.t += d.speed * dt * 60; if (d.t > 1) d.t -= 1; });
}

// ─── DRAW: TERRAIN ──────────────────────────────────────────────────
function drawTerrain() {
  // Mars surface gradient
  const dayFactor = Math.max(0, Math.sin(state.hour / 24.66 * Math.PI));
  const baseBright = 0.15 + dayFactor * 0.25;

  const tl = screenToWorld(0, 0), br = screenToWorld(W, H);
  const grd = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
  grd.addColorStop(0, `rgba(${Math.round(140 * baseBright)},${Math.round(70 * baseBright)},${Math.round(40 * baseBright)},1)`);
  grd.addColorStop(1, `rgba(${Math.round(80 * baseBright)},${Math.round(35 * baseBright)},${Math.round(20 * baseBright)},1)`);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  // Craters
  craters.forEach(cr => {
    const [sx, sy] = worldToScreen(cr.x, cr.y);
    const sr = cr.r * cam.zoom;
    if (sx + sr < -50 || sx - sr > W + 50 || sy + sr < -50 || sy - sr > H + 50) return;
    const cg = ctx.createRadialGradient(sx - sr * 0.2, sy - sr * 0.2, 0, sx, sy, sr);
    cg.addColorStop(0, `rgba(60,30,15,${0.3 * baseBright})`);
    cg.addColorStop(0.7, `rgba(90,45,25,${0.15 * baseBright})`);
    cg.addColorStop(1, 'transparent');
    ctx.fillStyle = cg;
    ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = `rgba(110,55,30,${0.2 * baseBright})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  });

  // Rocks
  rocks.forEach(r => {
    const [sx, sy] = worldToScreen(r.x, r.y);
    const sr = r.r * cam.zoom;
    if (sx < -20 || sx > W + 20 || sy < -20 || sy > H + 20) return;
    ctx.fillStyle = `rgba(100,50,30,${0.4 * baseBright})`;
    ctx.save();
    ctx.translate(sx, sy); ctx.rotate(r.rot);
    ctx.beginPath();
    ctx.moveTo(-sr, sr * 0.3);
    ctx.lineTo(-sr * 0.3, -sr);
    ctx.lineTo(sr * 0.6, -sr * 0.5);
    ctx.lineTo(sr, sr * 0.4);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  });

  // Ice deposit (north)
  const [ix, iy] = worldToScreen(15, -65);
  const ir = 20 * cam.zoom;
  const ig = ctx.createRadialGradient(ix, iy, 0, ix, iy, ir);
  ig.addColorStop(0, 'rgba(180,210,230,0.12)');
  ig.addColorStop(1, 'transparent');
  ctx.fillStyle = ig;
  ctx.beginPath(); ctx.arc(ix, iy, ir, 0, Math.PI * 2); ctx.fill();
}

// ─── DRAW: GRID ─────────────────────────────────────────────────────
function drawGrid() {
  const step = 10;
  const tl = screenToWorld(0, 0), br = screenToWorld(W, H);
  const startX = Math.floor(tl[0] / step) * step;
  const startY = Math.floor(tl[1] / step) * step;
  ctx.strokeStyle = 'rgba(200,200,200,0.06)';
  ctx.lineWidth = 0.5;
  ctx.font = `${Math.max(8, 9 * Math.min(cam.zoom / 3, 1))}px "Courier New"`;
  ctx.fillStyle = 'rgba(200,200,200,0.15)';
  for (let x = startX; x <= br[0]; x += step) {
    const [sx] = worldToScreen(x, 0);
    ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, H); ctx.stroke();
    if (x % 50 === 0 && cam.zoom > 1.5) {
      ctx.fillText(`${x}m`, sx + 2, H - 4);
    }
  }
  for (let y = startY; y <= br[1]; y += step) {
    const [, sy] = worldToScreen(0, y);
    ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(W, sy); ctx.stroke();
    if (y % 50 === 0 && cam.zoom > 1.5) {
      ctx.fillText(`${y}m`, 4, sy - 2);
    }
  }
}

// ─── DRAW: MODULES ──────────────────────────────────────────────────
const now = () => performance.now() / 1000;
function drawModules(t) {
  moduleDefs.forEach(m => {
    const mod = state.modules[m.id];
    const [sx, sy] = worldToScreen(m.x, m.y);
    const sw = m.w * cam.zoom, sh = m.h * cam.zoom;
    const selected = selectedModule === m.id;
    const pulse = selected ? 0.6 + Math.sin(t * 4) * 0.4 : 0;

    ctx.save();
    // Glow
    if (selected) {
      ctx.shadowColor = m.color;
      ctx.shadowBlur = 18;
    }

    if (m.shape === 'circle') {
      const r = sw / 2;
      // Greenhouse pulse
      const gpulse = m.id === 'greenhouse' ? 0.15 + Math.sin(t * 1.5) * 0.05 : 0.1;
      ctx.fillStyle = m.color.replace(')', `,${gpulse})`).replace('rgb', 'rgba');
      if (!m.color.startsWith('rgba')) {
        ctx.fillStyle = hexToRGBA(m.color, gpulse);
      }
      ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = m.color;
      ctx.lineWidth = selected ? 2.5 : 1.5;
      ctx.stroke();
    } else {
      // Landing pad markings
      if (m.id === 'landing') {
        ctx.fillStyle = 'rgba(50,50,50,0.3)';
        ctx.fillRect(sx - sw / 2, sy - sh / 2, sw, sh);
        ctx.strokeStyle = '#8b949e';
        ctx.lineWidth = 1;
        ctx.setLineDash([4 * cam.zoom, 4 * cam.zoom]);
        ctx.strokeRect(sx - sw / 2 + 4, sy - sh / 2 + 4, sw - 8, sh - 8);
        ctx.setLineDash([]);
        // Cross
        ctx.beginPath();
        ctx.moveTo(sx - sw * 0.3, sy); ctx.lineTo(sx + sw * 0.3, sy);
        ctx.moveTo(sx, sy - sh * 0.3); ctx.lineTo(sx, sy + sh * 0.3);
        ctx.strokeStyle = 'rgba(139,148,158,0.5)';
        ctx.stroke();
        // H
        ctx.strokeStyle = 'rgba(139,148,158,0.6)';
        ctx.lineWidth = 1.5;
        const hs = Math.min(sw, sh) * 0.15;
        ctx.beginPath();
        ctx.moveTo(sx - hs, sy - hs); ctx.lineTo(sx - hs, sy + hs);
        ctx.moveTo(sx + hs, sy - hs); ctx.lineTo(sx + hs, sy + hs);
        ctx.moveTo(sx - hs, sy); ctx.lineTo(sx + hs, sy);
        ctx.stroke();
      }
      // Solar panels — rotate with sun
      else if (m.id.startsWith('solar')) {
        const sunAngle = (state.hour / 24.66) * Math.PI - Math.PI / 2;
        const tilt = Math.sin(sunAngle) * 0.15;
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(tilt);
        // Panel segments
        const panels = 5;
        const pw = sw / panels;
        for (let i = 0; i < panels; i++) {
          const px = -sw / 2 + i * pw + 1;
          ctx.fillStyle = `rgba(227,179,65,${0.2 + Math.sin(t + i) * 0.05})`;
          ctx.fillRect(px, -sh / 2, pw - 2, sh);
          ctx.strokeStyle = m.color;
          ctx.lineWidth = 0.8;
          ctx.strokeRect(px, -sh / 2, pw - 2, sh);
        }
        ctx.restore();
      } else {
        ctx.fillStyle = hexToRGBA(m.color, 0.1);
        ctx.fillRect(sx - sw / 2, sy - sh / 2, sw, sh);
        ctx.strokeStyle = m.color;
        ctx.lineWidth = selected ? 2.5 : 1.2;
        ctx.strokeRect(sx - sw / 2, sy - sh / 2, sw, sh);
      }
    }
    ctx.restore();

    // Icon and label
    if (cam.zoom > 1.2) {
      const fontSize = Math.round(Math.min(14, 10 * cam.zoom / 2.5));
      ctx.font = `${fontSize}px "Courier New"`;
      ctx.textAlign = 'center';
      ctx.fillStyle = '#c9d1d9';
      ctx.fillText(m.icon, sx, sy + fontSize * 0.35);
      if (cam.zoom > 1.8) {
        ctx.font = `${Math.max(8, fontSize - 3)}px "Courier New"`;
        ctx.fillStyle = 'rgba(201,209,217,0.7)';
        ctx.fillText(m.name, sx, sy + sh / 2 + fontSize);
      }
    }
  });
}

// ─── DRAW: CREW ─────────────────────────────────────────────────────
function drawCrew(t) {
  state.crew.forEach((c, i) => {
    const [sx, sy] = worldToScreen(c.x, c.y);
    const r = 3 * cam.zoom;
    // Trail
    ctx.fillStyle = hexToRGBA(c.color, 0.1);
    ctx.beginPath(); ctx.arc(sx, sy, r * 2, 0, Math.PI * 2); ctx.fill();
    // Dot
    const pulse = 1 + Math.sin(t * 3 + i) * 0.2;
    ctx.fillStyle = c.color;
    ctx.beginPath(); ctx.arc(sx, sy, r * pulse, 0, Math.PI * 2); ctx.fill();
    // Direction indicator
    const dx = c.tx - c.x, dy = c.ty - c.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 1) {
      ctx.strokeStyle = hexToRGBA(c.color, 0.4);
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx + (dx / dist) * r * 3, sy + (dy / dist) * r * 3);
      ctx.stroke();
    }
    // Hover detection
    const md = Math.sqrt((mouseScreen[0] - sx) ** 2 + (mouseScreen[1] - sy) ** 2);
    if (md < r * 3) hoveredCrew = c;
  });
}

// ─── DRAW: OVERLAYS ─────────────────────────────────────────────────
function drawConnectionLines(lines, color, t) {
  lines.forEach(([fromId, toId]) => {
    const fm = state.modules[fromId], tm = state.modules[toId];
    if (!fm || !tm) return;
    const [fx, fy] = worldToScreen(fm.x, fm.y);
    const [tx, ty] = worldToScreen(tm.x, tm.y);
    ctx.strokeStyle = hexToRGBA(color, 0.25);
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 6]);
    ctx.lineDashOffset = -t * 30;
    ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(tx, ty); ctx.stroke();
    ctx.setLineDash([]);
  });
}

function drawFlowDots(t) {
  flowDots.forEach(d => {
    const fm = state.modules[d.from], tm = state.modules[d.to];
    if (!fm || !tm) return;
    const [fx, fy] = worldToScreen(fm.x, fm.y);
    const [tx, ty] = worldToScreen(tm.x, tm.y);
    const x = fx + (tx - fx) * d.t, y = fy + (ty - fy) * d.t;
    let col = '#e3b341';
    if (o2Lines.some(l => l[0] === d.from && l[1] === d.to)) col = '#39d2e0';
    if (waterLines.some(l => l[0] === d.from && l[1] === d.to)) col = '#58a6ff';
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(x, y, 2 * cam.zoom, 0, Math.PI * 2); ctx.fill();
  });
}

function drawThermalOverlay() {
  moduleDefs.forEach(m => {
    const [sx, sy] = worldToScreen(m.x, m.y);
    const r = Math.max(m.w, m.h) * cam.zoom * 0.8;
    const temp = m.id === 'hab' ? 21 : m.id === 'greenhouse' ? 24 : m.id.startsWith('solar') ? -30 : -10;
    const warm = (temp + 40) / 70;
    const grd = ctx.createRadialGradient(sx, sy, 0, sx, sy, r);
    grd.addColorStop(0, `rgba(${Math.round(warm * 255)},${Math.round(30)},${Math.round((1 - warm) * 255)},0.2)`);
    grd.addColorStop(1, 'transparent');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2); ctx.fill();
  });
}

function drawHazardOverlay() {
  // Radiation zone (south-east)
  const [rx, ry] = worldToScreen(55, 35);
  const rr = 30 * cam.zoom;
  const rg = ctx.createRadialGradient(rx, ry, 0, rx, ry, rr);
  rg.addColorStop(0, 'rgba(218,54,51,0.15)');
  rg.addColorStop(1, 'transparent');
  ctx.fillStyle = rg;
  ctx.beginPath(); ctx.arc(rx, ry, rr, 0, Math.PI * 2); ctx.fill();
  if (cam.zoom > 1.5) {
    ctx.font = '10px "Courier New"';
    ctx.fillStyle = 'rgba(218,54,51,0.6)';
    ctx.textAlign = 'center';
    ctx.fillText('⚠ RADIATION', rx, ry);
  }

  // Perchlorate zone (north-west)
  const [px, py] = worldToScreen(-50, -50);
  const pr = 25 * cam.zoom;
  const pg = ctx.createRadialGradient(px, py, 0, px, py, pr);
  pg.addColorStop(0, 'rgba(218,100,51,0.12)');
  pg.addColorStop(1, 'transparent');
  ctx.fillStyle = pg;
  ctx.beginPath(); ctx.arc(px, py, pr, 0, Math.PI * 2); ctx.fill();
  if (cam.zoom > 1.5) {
    ctx.font = '10px "Courier New"';
    ctx.fillStyle = 'rgba(218,100,51,0.6)';
    ctx.textAlign = 'center';
    ctx.fillText('⚠ PERCHLORATE', px, py);
  }
}

// ─── DRAW: DUST ─────────────────────────────────────────────────────
function drawDust() {
  const intensity = state.weather.dust;
  if (intensity < 0.05) return;
  dustParticles.forEach(p => {
    const [sx, sy] = worldToScreen(p.x, p.y);
    if (sx < -10 || sx > W + 10 || sy < -10 || sy > H + 10) return;
    ctx.fillStyle = `rgba(180,120,70,${p.a * intensity})`;
    ctx.beginPath(); ctx.arc(sx, sy, p.s * cam.zoom * 0.5, 0, Math.PI * 2); ctx.fill();
  });
}

// ─── DRAW: SUN INDICATOR ────────────────────────────────────────────
function drawSunIndicator() {
  const sunAngle = (state.hour / 24.66) * Math.PI * 2 - Math.PI / 2;
  const r = Math.min(W, H) * 0.42;
  const sx = W / 2 + Math.cos(sunAngle) * r;
  const sy = H / 2 + Math.sin(sunAngle) * r;
  const dayFactor = Math.max(0, Math.sin(state.hour / 24.66 * Math.PI));
  if (dayFactor > 0.05) {
    const sg = ctx.createRadialGradient(sx, sy, 0, sx, sy, 20);
    sg.addColorStop(0, `rgba(255,220,100,${dayFactor * 0.6})`);
    sg.addColorStop(1, 'transparent');
    ctx.fillStyle = sg;
    ctx.beginPath(); ctx.arc(sx, sy, 20, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = `rgba(255,220,100,${dayFactor * 0.8})`;
    ctx.font = '14px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('☀', sx, sy + 5);
  }
}

// ─── DRAW: HUD ──────────────────────────────────────────────────────
function drawHUD(t) {
  ctx.save();
  ctx.textAlign = 'left';

  // ── Top-left: SOL, Time, CRI ──
  const panelW = 180, panelH = 95;
  ctx.fillStyle = 'rgba(13,17,23,0.85)';
  roundRect(ctx, 10, 40, panelW, panelH, 4); ctx.fill();
  ctx.strokeStyle = '#30363d'; ctx.lineWidth = 1;
  roundRect(ctx, 10, 40, panelW, panelH, 4); ctx.stroke();

  ctx.font = '13px "Courier New"';
  ctx.fillStyle = '#f0883e';
  ctx.fillText(`SOL ${state.sol}`, 20, 60);
  ctx.fillStyle = '#8b949e';
  const hh = Math.floor(state.hour), mm = Math.floor((state.hour % 1) * 60);
  ctx.fillText(`${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')} MCT`, 100, 60);

  // CRI gauge
  const cx = 55, cy = 100, cr = 22;
  const criColor = state.cri > 70 ? '#3fb950' : state.cri > 40 ? '#e3b341' : '#da3633';
  ctx.beginPath();
  ctx.arc(cx, cy, cr, Math.PI * 0.8, Math.PI * 2.2);
  ctx.strokeStyle = '#30363d'; ctx.lineWidth = 4; ctx.stroke();
  ctx.beginPath();
  const criAngle = Math.PI * 0.8 + (state.cri / 100) * Math.PI * 1.4;
  ctx.arc(cx, cy, cr, Math.PI * 0.8, criAngle);
  ctx.strokeStyle = criColor; ctx.lineWidth = 4; ctx.stroke();
  ctx.fillStyle = criColor;
  ctx.font = 'bold 12px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText(state.cri, cx, cy + 4);
  ctx.font = '8px "Courier New"';
  ctx.fillStyle = '#8b949e';
  ctx.fillText('CRI', cx, cy + 14);

  ctx.textAlign = 'left';
  ctx.font = '10px "Courier New"';
  ctx.fillStyle = '#8b949e';
  ctx.fillText('Colony Risk', 90, 95);
  ctx.fillText('Index', 90, 107);
  ctx.fillStyle = criColor;
  ctx.fillText(`${state.cri}%`, 130, 107);

  // ── Top-right: Weather ──
  const wxW = 170, wxH = 90;
  const wxX = W - wxW - 10, wxY = 40;
  ctx.fillStyle = 'rgba(13,17,23,0.85)';
  roundRect(ctx, wxX, wxY, wxW, wxH, 4); ctx.fill();
  ctx.strokeStyle = '#30363d'; ctx.lineWidth = 1;
  roundRect(ctx, wxX, wxY, wxW, wxH, 4); ctx.stroke();

  ctx.font = '10px "Courier New"';
  ctx.fillStyle = '#8b949e';
  ctx.textAlign = 'left';
  ctx.fillText('WEATHER', wxX + 8, wxY + 14);
  ctx.font = '11px "Courier New"';
  ctx.fillStyle = '#c9d1d9';
  ctx.fillText(`${state.weather.temp.toFixed(0)}°C`, wxX + 8, wxY + 32);
  ctx.fillStyle = state.weather.dustStorm ? '#da3633' : '#8b949e';
  ctx.fillText(`Dust: ${(state.weather.dust * 100).toFixed(0)}%`, wxX + 8, wxY + 48);
  ctx.fillStyle = '#c9d1d9';
  ctx.fillText(`Solar: ${(state.weather.solarFlux * 100).toFixed(0)}%`, wxX + 8, wxY + 64);
  ctx.fillText(`Wind: ${state.weather.windSpeed.toFixed(0)}m/s`, wxX + 8, wxY + 80);

  // Wind arrow
  const arrowCx = wxX + wxW - 25, arrowCy = wxY + 55, arrowR = 14;
  ctx.save();
  ctx.translate(arrowCx, arrowCy);
  ctx.rotate(state.weather.windDir * Math.PI / 180);
  ctx.strokeStyle = '#58a6ff'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, -arrowR); ctx.lineTo(0, arrowR); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -arrowR); ctx.lineTo(-4, -arrowR + 6); ctx.moveTo(0, -arrowR); ctx.lineTo(4, -arrowR + 6); ctx.stroke();
  ctx.restore();
  ctx.beginPath(); ctx.arc(arrowCx, arrowCy, arrowR + 2, 0, Math.PI * 2);
  ctx.strokeStyle = '#30363d'; ctx.lineWidth = 0.5; ctx.stroke();

  if (state.weather.dustStorm) {
    ctx.font = 'bold 10px "Courier New"';
    ctx.fillStyle = '#da3633';
    ctx.textAlign = 'center';
    const blink = Math.sin(t * 5) > 0;
    if (blink) ctx.fillText('⚠ DUST STORM', wxX + wxW / 2, wxY - 4);
  }

  // ── Bottom: Resource bars ──
  const barW = Math.min(200, (W - 80) / 4);
  const barH = 14;
  const barY = H - 40;
  const bars = [
    { label: 'PWR', val: state.resources.power, color: '#e3b341' },
    { label: 'O₂ ', val: state.resources.o2,    color: '#39d2e0' },
    { label: 'H₂O', val: state.resources.h2o,   color: '#58a6ff' },
    { label: 'FOOD',val: state.resources.food,   color: '#3fb950' }
  ];
  const totalBarW = bars.length * (barW + 12);
  const barStartX = (W - totalBarW) / 2;

  ctx.fillStyle = 'rgba(13,17,23,0.85)';
  roundRect(ctx, barStartX - 10, barY - 18, totalBarW + 20, barH + 30, 4); ctx.fill();
  ctx.strokeStyle = '#30363d'; ctx.lineWidth = 1;
  roundRect(ctx, barStartX - 10, barY - 18, totalBarW + 20, barH + 30, 4); ctx.stroke();

  bars.forEach((b, i) => {
    const bx = barStartX + i * (barW + 12);
    ctx.font = '9px "Courier New"';
    ctx.fillStyle = '#8b949e';
    ctx.textAlign = 'left';
    ctx.fillText(b.label, bx, barY - 4);
    ctx.fillStyle = '#161b22';
    roundRect(ctx, bx, barY, barW, barH, 2); ctx.fill();
    const fill = b.val < 25 ? '#da3633' : b.color;
    ctx.fillStyle = fill;
    roundRect(ctx, bx, barY, barW * (b.val / 100), barH, 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText(`${b.val.toFixed(0)}%`, bx + barW / 2, barY + 10);
  });

  // ── Bottom-right: Crew roster ──
  const crewPanelW = 160, crewRowH = 16;
  const crewPanelH = state.crew.length * crewRowH + 22;
  const crewX = W - crewPanelW - 10, crewY = H - crewPanelH - 10;
  ctx.fillStyle = 'rgba(13,17,23,0.85)';
  roundRect(ctx, crewX, crewY, crewPanelW, crewPanelH, 4); ctx.fill();
  ctx.strokeStyle = '#30363d'; ctx.lineWidth = 1;
  roundRect(ctx, crewX, crewY, crewPanelW, crewPanelH, 4); ctx.stroke();
  ctx.font = '9px "Courier New"';
  ctx.fillStyle = '#8b949e';
  ctx.textAlign = 'left';
  ctx.fillText('CREW', crewX + 6, crewY + 12);

  state.crew.forEach((c, i) => {
    const ry = crewY + 18 + i * crewRowH;
    ctx.fillStyle = c.color;
    ctx.beginPath(); ctx.arc(crewX + 12, ry + 4, 3, 0, Math.PI * 2); ctx.fill();
    ctx.font = '9px "Courier New"';
    ctx.fillStyle = '#c9d1d9';
    ctx.fillText(c.name.split(' ')[0].replace('.', ''), crewX + 20, ry + 8);
    // HP bar
    const hpX = crewX + 85, hpW = 55;
    ctx.fillStyle = '#161b22';
    ctx.fillRect(hpX, ry, hpW, 8);
    const hpColor = c.hp > 70 ? '#3fb950' : c.hp > 40 ? '#e3b341' : '#da3633';
    ctx.fillStyle = hpColor;
    ctx.fillRect(hpX, ry, hpW * (c.hp / 100), 8);
    ctx.font = '7px "Courier New"';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.fillText(`${c.hp}`, hpX + hpW / 2, ry + 7);
    ctx.textAlign = 'left';
  });

  ctx.restore();
}

// ─── DRAW: TOOLTIP ──────────────────────────────────────────────────
function updateTooltip() {
  const tt = document.getElementById('tooltip');
  if (hoveredCrew) {
    tt.style.display = 'block';
    tt.style.left = (mouseScreen[0] + 15) + 'px';
    tt.style.top = (mouseScreen[1] - 10) + 'px';
    tt.querySelector('.tt-title').textContent = hoveredCrew.name;
    tt.querySelector('.tt-body').innerHTML =
      `<div class="tt-row">HP: <span>${hoveredCrew.hp}%</span></div>` +
      `<div class="tt-row">Status: <span>${hoveredCrew.status}</span></div>`;
    return;
  }
  if (selectedModule) {
    const m = state.modules[selectedModule];
    if (m) {
      const [sx, sy] = worldToScreen(m.x, m.y);
      tt.style.display = 'block';
      tt.style.left = (sx + m.w * cam.zoom / 2 + 10) + 'px';
      tt.style.top = (sy - 20) + 'px';
      tt.querySelector('.tt-title').textContent = `${m.icon} ${m.name}`;
      tt.querySelector('.tt-body').innerHTML =
        `<div class="tt-row">HP: <span>${m.hp}%</span></div>` +
        `<div class="tt-row">Power: <span>${m.powered ? '✅ ON' : '❌ OFF'}</span></div>` +
        `<div class="tt-row">Pos: <span>(${m.x}, ${m.y})</span></div>`;
      return;
    }
  }
  tt.style.display = 'none';
}

// ─── DRAW: MINIMAP ──────────────────────────────────────────────────
let showMinimap = true;
function drawMinimap() {
  if (!showMinimap) return;
  const mw = 140, mh = 140;
  const mx = 10, my = H - mh - 55;
  const scale = mw / 400;

  ctx.fillStyle = 'rgba(13,17,23,0.85)';
  roundRect(ctx, mx, my, mw, mh, 4); ctx.fill();
  ctx.strokeStyle = '#30363d'; ctx.lineWidth = 1;
  roundRect(ctx, mx, my, mw, mh, 4); ctx.stroke();

  ctx.save();
  ctx.beginPath();
  ctx.rect(mx, my, mw, mh);
  ctx.clip();

  // Modules on minimap
  moduleDefs.forEach(m => {
    const sx = mx + mw / 2 + m.x * scale;
    const sy = my + mh / 2 + m.y * scale;
    ctx.fillStyle = m.color;
    ctx.beginPath(); ctx.arc(sx, sy, 2, 0, Math.PI * 2); ctx.fill();
  });

  // Camera viewport
  const tl = screenToWorld(0, 0), br = screenToWorld(W, H);
  const vx = mx + mw / 2 + tl[0] * scale;
  const vy = my + mh / 2 + tl[1] * scale;
  const vw = (br[0] - tl[0]) * scale;
  const vh = (br[1] - tl[1]) * scale;
  ctx.strokeStyle = 'rgba(88,166,255,0.5)';
  ctx.lineWidth = 1;
  ctx.strokeRect(vx, vy, vw, vh);

  ctx.restore();

  ctx.font = '8px "Courier New"';
  ctx.fillStyle = '#484f58';
  ctx.textAlign = 'left';
  ctx.fillText('MINIMAP [M]', mx + 4, my + mh + 10);
}

// ─── HELPERS ────────────────────────────────────────────────────────
function hexToRGBA(hex, a) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${a})`;
}
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ─── INPUT ──────────────────────────────────────────────────────────
let dragging = false, dragStart = [0, 0], camStart = [0, 0];
canvas.addEventListener('mousedown', e => {
  dragging = true;
  dragStart = [e.clientX, e.clientY];
  camStart = [cam.x, cam.y];
});
window.addEventListener('mousemove', e => {
  mouseScreen = [e.clientX, e.clientY];
  mouseWorld = screenToWorld(e.clientX, e.clientY);
  if (dragging) {
    cam.x = camStart[0] - (e.clientX - dragStart[0]) / cam.zoom;
    cam.y = camStart[1] - (e.clientY - dragStart[1]) / cam.zoom;
  }
});
window.addEventListener('mouseup', () => { dragging = false; });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
  cam.targetZoom = clamp(cam.targetZoom * zoomFactor, 0.5, 12);
}, { passive: false });

canvas.addEventListener('click', e => {
  const [wx, wy] = screenToWorld(e.clientX, e.clientY);
  selectedModule = null;
  for (const m of moduleDefs) {
    const hw = m.w / 2, hh = m.h / 2;
    if (wx >= m.x - hw && wx <= m.x + hw && wy >= m.y - hh && wy <= m.y + hh) {
      selectedModule = m.id;
      break;
    }
  }
});

document.addEventListener('keydown', e => {
  const key = e.key;
  if (key === '1') toggleOverlay('power');
  else if (key === '2') toggleOverlay('o2');
  else if (key === '3') toggleOverlay('water');
  else if (key === '4') toggleOverlay('thermal');
  else if (key === '5') toggleOverlay('hazard');
  else if (key === ' ') { e.preventDefault(); paused = !paused; }
  else if (key === '+' || key === '=') cam.targetZoom = clamp(cam.targetZoom * 1.15, 0.5, 12);
  else if (key === '-') cam.targetZoom = clamp(cam.targetZoom * 0.87, 0.5, 12);
  else if (key === 'm' || key === 'M') showMinimap = !showMinimap;
});

function toggleOverlay(name) {
  overlays[name] = !overlays[name];
  document.querySelectorAll('.ovl-btn').forEach(b => {
    if (b.dataset.ov === name) b.classList.toggle('active', overlays[name]);
  });
  initFlowDots();
}

document.querySelectorAll('.ovl-btn').forEach(b => {
  b.addEventListener('click', () => toggleOverlay(b.dataset.ov));
});

// ─── MAIN LOOP ──────────────────────────────────────────────────────
let lastTime = performance.now();
function frame(ts) {
  requestAnimationFrame(frame);
  const dt = Math.min((ts - lastTime) / 1000, 0.1);
  lastTime = ts;
  const t = ts / 1000;

  // Smooth zoom
  cam.zoom += (cam.targetZoom - cam.zoom) * 0.12;

  if (!paused) {
    simTick(dt);
    updateCrew(dt);
    updateDust(dt);
    updateFlowDots(dt);
  }

  hoveredCrew = null;

  // Clear
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  // Draw layers
  drawTerrain();
  drawGrid();

  // Overlays under modules
  if (overlays.thermal) drawThermalOverlay();
  if (overlays.hazard) drawHazardOverlay();
  if (overlays.power) drawConnectionLines(powerLines, '#e3b341', t);
  if (overlays.o2) drawConnectionLines(o2Lines, '#39d2e0', t);
  if (overlays.water) drawConnectionLines(waterLines, '#58a6ff', t);
  drawFlowDots(t);

  drawModules(t);
  drawCrew(t);
  drawDust();
  drawSunIndicator();
  drawHUD(t);
  drawMinimap();
  updateTooltip();

  // Day/night vignette
  const dayFactor = Math.max(0, Math.sin(state.hour / 24.66 * Math.PI));
  const nightAlpha = (1 - dayFactor) * 0.35;
  if (nightAlpha > 0.01) {
    const ng = ctx.createRadialGradient(W / 2, H / 2, W * 0.1, W / 2, H / 2, W * 0.7);
    ng.addColorStop(0, 'transparent');
    ng.addColorStop(1, `rgba(5,5,15,${nightAlpha})`);
    ctx.fillStyle = ng;
    ctx.fillRect(0, 0, W, H);
  }
}
requestAnimationFrame(frame);
</script>
