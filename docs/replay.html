<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Replay Viewer — Watch a Cartridge Play Out</title>
<style>
:root{--bg:#0a0e14;--card:#161b22;--border:rgba(88,166,255,0.15);--text:#c9d1d9;--dim:#484f58;
--blue:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#da3633;--cyan:#79c0ff;
--purple:#a371f7;--font:'Courier New',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
.wrap{max-width:900px;margin:0 auto;padding:32px 20px 80px}
h1{font-size:20px;color:var(--cyan);letter-spacing:2px;margin-bottom:4px}
.sub{color:var(--dim);font-size:11px;margin-bottom:20px}
.nav{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.nav a{color:var(--dim);text-decoration:none;font-size:11px;padding:4px 10px;
border:1px solid var(--border);border-radius:4px;transition:all 0.2s}
.nav a:hover{color:var(--cyan);border-color:var(--cyan)}

.drop-zone{border:2px dashed var(--border);border-radius:12px;padding:40px;text-align:center;
cursor:pointer;transition:all 0.3s;margin:20px 0}
.drop-zone:hover{border-color:var(--cyan);background:rgba(88,166,255,0.03)}
.drop-zone.dragover{border-color:var(--green);background:rgba(63,185,80,0.08)}
.drop-zone h3{color:var(--cyan);font-size:14px;margin-bottom:6px}
.drop-zone p{color:var(--dim);font-size:11px}

.player{display:none;margin:20px 0}
.player-bar{display:flex;align-items:center;gap:12px;padding:12px;background:var(--card);
border:1px solid var(--border);border-radius:8px;margin-bottom:12px}
.play-btn{padding:8px 16px;background:rgba(63,185,80,0.15);border:1px solid var(--green);
color:var(--green);border-radius:6px;cursor:pointer;font-family:var(--font);font-size:13px;
font-weight:700}
.play-btn:hover{background:rgba(63,185,80,0.3)}
.timeline{flex:1;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;cursor:pointer;
position:relative;overflow:hidden}
.timeline-fill{height:100%;background:var(--cyan);border-radius:4px;transition:width 0.1s}
.sol-label{font-size:14px;color:var(--cyan);font-weight:700;min-width:80px;text-align:right}
.speed-btn{padding:4px 8px;background:none;border:1px solid var(--border);color:var(--dim);
border-radius:4px;cursor:pointer;font-family:var(--font);font-size:10px}
.speed-btn.active{color:var(--cyan);border-color:var(--cyan)}

.replay-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.replay-panel{background:var(--card);border:1px solid var(--border);border-radius:8px;
padding:12px;font-size:11px}
.replay-panel h3{color:var(--cyan);font-size:10px;letter-spacing:1px;margin-bottom:8px}

.event-item{padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:10px}
.decision-item{padding:6px 8px;margin:4px 0;border-radius:4px;font-size:10px}
.decision-approve{background:rgba(63,185,80,0.1);border-left:3px solid var(--green)}
.decision-deny{background:rgba(218,54,51,0.1);border-left:3px solid var(--red)}
.decision-alt{background:rgba(88,166,255,0.1);border-left:3px solid var(--blue)}
.decision-timeout{background:rgba(210,153,34,0.1);border-left:3px solid var(--yellow)}

.kv{display:flex;justify-content:space-between;padding:2px 0}
.kv .k{color:var(--dim)}.kv .v{color:var(--text);font-weight:700}

.chart-canvas{width:100%;height:80px;background:#080b10;border-radius:4px;margin:8px 0}

.score-display{text-align:center;padding:20px;margin:12px 0;background:var(--card);
border:1px solid var(--border);border-radius:8px}
.score-grade{font-size:48px;font-weight:700}
.score-total{font-size:20px;color:var(--cyan);margin:4px 0}

@media(max-width:600px){.replay-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">

<h1>📼 REPLAY VIEWER</h1>
<div class="sub">Drop a .cartridge.json to watch every decision play out like a movie.</div>

<div class="nav">
<a href="viewer.html">▶ Play</a>
<a href="simhub.html">🏆 SimHub</a>
<a href="hall-of-fame.html">🏅 LisPy</a>
<a href="patterns.html">🔧 Patterns</a>
</div>

<div id="drop-area" class="drop-zone" onclick="document.getElementById('file-input').click()"
  ondragover="event.preventDefault();this.classList.add('dragover')"
  ondragleave="this.classList.remove('dragover')"
  ondrop="event.preventDefault();this.classList.remove('dragover');loadFile(event.dataTransfer.files[0])">
  <h3>📼 DROP CARTRIDGE HERE</h3>
  <p>or click to browse for a .cartridge.json file</p>
  <input type="file" id="file-input" accept=".json" onchange="loadFile(this.files[0])" style="display:none">
</div>

<div class="player" id="player">
  <div class="player-bar">
    <button class="play-btn" id="play-btn" onclick="togglePlay()">▶ PLAY</button>
    <div class="timeline" id="timeline" onclick="seek(event)">
      <div class="timeline-fill" id="timeline-fill" style="width:0%"></div>
    </div>
    <div class="sol-label" id="sol-label">Sol 0</div>
    <button class="speed-btn active" onclick="setSpeed(1)">1×</button>
    <button class="speed-btn" onclick="setSpeed(3)">3×</button>
    <button class="speed-btn" onclick="setSpeed(10)">10×</button>
  </div>

  <div id="score-area" class="score-display" style="display:none"></div>

  <div class="replay-grid">
    <div class="replay-panel">
      <h3>COLONY STATE</h3>
      <div id="state-display"></div>
      <h3 style="margin-top:12px">RESOURCES</h3>
      <canvas class="chart-canvas" id="resource-chart"></canvas>
    </div>
    <div class="replay-panel">
      <h3>DECISIONS</h3>
      <div id="decisions-display" style="max-height:200px;overflow-y:auto"></div>
      <h3 style="margin-top:12px">EVENT LOG</h3>
      <div id="events-display" style="max-height:150px;overflow-y:auto"></div>
    </div>
  </div>
</div>

</div>

<script>
let cartridge = null;
let echoes = [];
let decisions = [];
let playing = false;
let currentSol = 0;
let maxSol = 0;
let playInterval = null;
let speed = 1;
let resourceHistory = [];

function loadFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      cartridge = JSON.parse(e.target.result);
      if (cartridge._format !== 'mars-barn-cartridge') {
        alert('Not a valid cartridge');
        return;
      }
      initReplay();
    } catch (err) {
      alert('Failed to parse: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function initReplay() {
  document.getElementById('drop-area').style.display = 'none';
  document.getElementById('player').style.display = 'block';

  echoes = cartridge.echoHistory || [];
  decisions = cartridge.taskHistory || [];
  maxSol = cartridge.sol || echoes.length;
  currentSol = 0;

  // Build resource history from echoes
  resourceHistory = [];
  let o2 = cartridge.config?.o2 || 100;
  let h2o = cartridge.config?.h2o || 300;
  let food = cartridge.config?.food || 300000;
  let power = cartridge.config?.power || 500;
  
  for (const echo of echoes) {
    if (echo.delta) {
      o2 += echo.delta.o2 || 0;
      h2o += echo.delta.h2o || 0;
      food += echo.delta.food || 0;
      power += echo.delta.power || 0;
    }
    resourceHistory.push({ sol: echo.frame, o2, h2o, food: food/1000, power, cri: echo.cri || 0 });
  }

  // Show score if dead
  if (!cartridge.alive && cartridge.score) {
    const sc = cartridge.score;
    const area = document.getElementById('score-area');
    const gradeColor = sc.grade === 'S+' || sc.grade === 'S' ? '#ffd700' :
      sc.grade === 'A' ? 'var(--green)' : sc.grade === 'B' ? 'var(--cyan)' :
      sc.grade === 'C' ? 'var(--yellow)' : 'var(--red)';
    area.innerHTML = `
      <div style="color:var(--red);font-size:12px;letter-spacing:2px">COLONY LOST — ${(cartridge.state?.cause || 'unknown').toUpperCase()}</div>
      <div class="score-grade" style="color:${gradeColor}">${sc.grade}</div>
      <div class="score-total">${(sc.total || 0).toLocaleString()} points</div>
    `;
    area.style.display = 'block';
  }

  renderSol(0);
}

function renderSol(sol) {
  currentSol = sol;
  const pct = maxSol > 0 ? (sol / maxSol * 100) : 0;
  document.getElementById('timeline-fill').style.width = pct + '%';
  document.getElementById('sol-label').textContent = 'Sol ' + sol;

  // Find echo at this sol
  const echo = echoes.find(e => e.frame === sol) || echoes[Math.min(sol, echoes.length - 1)];

  // State display
  const stateEl = document.getElementById('state-display');
  if (echo) {
    const d = echo.delta || {};
    stateEl.innerHTML = `
      <div class="kv"><span class="k">Sol</span><span class="v" style="color:var(--cyan)">${echo.frame}</span></div>
      <div class="kv"><span class="k">Alive</span><span class="v" style="color:${echo.alive !== false ? 'var(--green)' : 'var(--red)'}">${echo.alive !== false ? 'YES' : 'NO'}</span></div>
      <div class="kv"><span class="k">CRI</span><span class="v" style="color:${(echo.cri||0)>50?'var(--red)':'var(--green)'}">${echo.cri || '?'} ${echo.cri_grade || ''}</span></div>
      <div class="kv"><span class="k">ΔO₂</span><span class="v" style="color:${(d.o2||0)>0?'var(--green)':'var(--red)'}">${(d.o2||0).toFixed(2)}</span></div>
      <div class="kv"><span class="k">ΔH₂O</span><span class="v" style="color:${(d.h2o||0)>0?'var(--green)':'var(--red)'}">${(d.h2o||0).toFixed(2)}</span></div>
      <div class="kv"><span class="k">ΔPower</span><span class="v" style="color:${(d.power||0)>0?'var(--green)':'var(--red)'}">${(d.power||0).toFixed(1)}</span></div>
      <div class="kv"><span class="k">Events</span><span class="v">${(echo.events||[]).length}</span></div>
      <div class="kv"><span class="k">Reflexes</span><span class="v">${echo.reflex_count || 0}</span></div>
    `;
  }

  // Decisions up to this sol
  const dEl = document.getElementById('decisions-display');
  const relevantDecisions = decisions.filter(d => d.sol <= sol);
  dEl.innerHTML = relevantDecisions.slice(-10).reverse().map(d => {
    const cls = d.timedOut ? 'decision-timeout' : d.choice === 'approve' ? 'decision-approve' :
      d.choice === 'alt' ? 'decision-alt' : 'decision-deny';
    const icon = d.timedOut ? '⏱️' : d.choice === 'approve' ? '✓' : d.choice === 'alt' ? '◐' : '✗';
    return `<div class="decision-item ${cls}">${icon} Sol ${d.sol}: ${(d.id || '?').replace(/_/g, ' ')}${d.timedOut ? ' (TIMEOUT)' : ''}</div>`;
  }).join('') || '<div style="color:var(--dim)">No decisions yet</div>';

  // Events
  const eEl = document.getElementById('events-display');
  if (echo && echo.events && echo.events.length) {
    eEl.innerHTML = echo.events.map(ev =>
      `<div class="event-item" style="color:var(--yellow)">${ev.type}: ${ev.desc || ''} (${(ev.severity * 100).toFixed(0)}%)</div>`
    ).join('');
  } else {
    eEl.innerHTML = '<div class="event-item" style="color:var(--dim)">No events this sol</div>';
  }

  // Resource chart
  drawResourceChart(sol);
}

function drawResourceChart(upToSol) {
  const canvas = document.getElementById('resource-chart');
  if (!canvas || !resourceHistory.length) return;
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = (rect.width - 24) * (window.devicePixelRatio || 1);
  canvas.height = 80 * (window.devicePixelRatio || 1);
  ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
  const w = rect.width - 24, h = 80;
  ctx.clearRect(0, 0, w, h);

  const visible = resourceHistory.slice(0, Math.min(upToSol + 1, resourceHistory.length));
  if (visible.length < 2) return;

  const maxVal = Math.max(...visible.map(v => Math.max(v.o2, v.h2o, v.power, v.food)), 1);
  const barW = w / visible.length;

  // Draw lines for each resource
  const lines = [
    { key: 'o2', color: '#58a6ff' },
    { key: 'power', color: '#a371f7' },
    { key: 'cri', color: '#da3633', scale: 100 },
  ];

  for (const line of lines) {
    ctx.beginPath();
    ctx.strokeStyle = line.color;
    ctx.lineWidth = 1.5;
    visible.forEach((v, i) => {
      const val = line.scale ? v[line.key] / line.scale : v[line.key] / maxVal;
      const x = i * barW;
      const y = h - Math.max(0, Math.min(1, val)) * h * 0.9 - 2;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();
  }

  // Legend
  ctx.font = '9px monospace';
  ctx.fillStyle = '#58a6ff'; ctx.fillText('O₂', 2, 10);
  ctx.fillStyle = '#a371f7'; ctx.fillText('PWR', 22, 10);
  ctx.fillStyle = '#da3633'; ctx.fillText('CRI', 48, 10);
}

function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('play-btn');
  if (playing) {
    btn.textContent = '⏸ PAUSE';
    playInterval = setInterval(() => {
      if (currentSol >= maxSol) { togglePlay(); return; }
      renderSol(currentSol + 1);
    }, 500 / speed);
  } else {
    btn.textContent = '▶ PLAY';
    clearInterval(playInterval);
  }
}

function seek(e) {
  const rect = e.target.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  renderSol(Math.floor(pct * maxSol));
}

function setSpeed(s) {
  speed = s;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (playing) {
    clearInterval(playInterval);
    playInterval = setInterval(() => {
      if (currentSol >= maxSol) { togglePlay(); return; }
      renderSol(currentSol + 1);
    }, 500 / speed);
  }
}
</script>
</body>
</html>
