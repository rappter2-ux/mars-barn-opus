<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mars Barn Opus — 3D Colony Viewer</title>
<script src="https://unpkg.com/globe.gl"></script>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<style>
:root{--bg:#0a0e14;--panel:rgba(10,14,20,0.92);--border:rgba(88,166,255,0.15);
--blue:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#da3633;--cyan:#79c0ff;
--text:#c9d1d9;--dim:#484f58;--font:'Courier New',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:var(--text);font-family:var(--font);overflow:hidden;height:100vh}

/* Header */
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--panel);
border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:16px}
.hdr h1{font-size:14px;color:var(--cyan);letter-spacing:2px}
.zoom-bar{display:flex;gap:2px}
.zoom-btn{padding:4px 10px;background:rgba(88,166,255,0.1);border:1px solid var(--border);
color:var(--dim);cursor:pointer;font-family:var(--font);font-size:11px;transition:all 0.2s}
.zoom-btn:hover{background:rgba(88,166,255,0.2);color:var(--text)}
.zoom-btn.active{background:rgba(88,166,255,0.3);color:var(--cyan);border-color:var(--cyan)}
.status{margin-left:auto;font-size:11px;color:var(--green)}
.pulsing{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);
animation:pulse 2s infinite;margin-right:6px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* Zoom transitions */
#globe-container,#warmap-view,#ground-view{transition:opacity 0.5s ease-in-out}
.fade-out{opacity:0!important;pointer-events:none}
.fade-in{opacity:1}

/* Globe container */
#globe-container{position:fixed;top:36px;left:0;right:0;bottom:0}
#globeViz{width:100%;height:100%}

/* Ground view overlay */
#ground-view{position:fixed;top:36px;left:0;right:0;bottom:0;z-index:50;display:none}
#ground-canvas{width:100%;height:100%}
.ground-hud{position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--border);
padding:12px 20px;z-index:60;display:flex;gap:24px;align-items:center}
.hud-stat{text-align:center}.hud-val{font-size:18px;font-weight:700;color:var(--cyan)}.hud-label{font-size:9px;color:var(--dim);text-transform:uppercase}
.ground-header{position:fixed;top:36px;left:0;right:0;background:var(--panel);border-bottom:1px solid var(--border);
padding:8px 20px;z-index:60;display:flex;align-items:center;justify-content:space-between}
.ground-header h2{font-size:13px;color:var(--cyan)}
.back-btn{background:rgba(218,54,51,0.2);border:1px solid var(--red);color:var(--red);padding:4px 12px;
cursor:pointer;font-family:var(--font);font-size:11px}
.back-btn:hover{background:rgba(218,54,51,0.4)}

/* Side panels */
.side-panel{position:fixed;top:36px;width:280px;bottom:0;z-index:40;background:var(--panel);
border-right:1px solid var(--border);overflow-y:auto;padding:12px;font-size:11px}
.side-panel.left{left:0}.side-panel.right{right:0;border-right:none;border-left:1px solid var(--border)}
.side-panel h3{color:var(--cyan);font-size:10px;letter-spacing:1.5px;margin:12px 0 6px;text-transform:uppercase}
.colony-card{background:rgba(88,166,255,0.05);border:1px solid var(--border);border-radius:4px;
padding:8px;margin:4px 0;cursor:pointer;transition:all 0.2s}
.colony-card:hover{background:rgba(88,166,255,0.1);border-color:var(--cyan)}
.colony-card .name{font-weight:700;color:var(--text)}.colony-card .hp{float:right}
.hp-bar{height:3px;background:rgba(255,255,255,0.1);border-radius:2px;margin-top:4px}
.hp-fill{height:100%;border-radius:2px;transition:width 0.5s}
.crew-row{padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;gap:6px;align-items:center}
.event-item{padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:10px;color:var(--dim)}
.event-item .tag{color:var(--red);font-weight:700}
.module-item{padding:3px 0;display:flex;justify-content:space-between}
.module-item .status{color:var(--green);font-size:10px}
.res-bar{display:flex;align-items:center;gap:6px;margin:3px 0}
.res-label{width:35px;color:var(--dim);font-size:10px}
.res-track{flex:1;height:8px;background:rgba(255,255,255,0.05);border-radius:2px}
.res-fill{height:100%;border-radius:2px;transition:width 0.3s}
.res-val{width:60px;text-align:right;font-size:10px}
</style>
</head>
<body>

<!-- Header with zoom levels -->
<div class="hdr">
  <h1>MARS BARN OPUS</h1>
  <div class="zoom-bar">
    <button class="zoom-btn active" onclick="setZoom('planet')" id="z-planet">PLANET</button>
    <button class="zoom-btn" onclick="setZoom('surface')" id="z-surface">SURFACE</button>
    <button class="zoom-btn" onclick="setZoom('warmap')" id="z-warmap">WARMAP</button>
    <button class="zoom-btn" onclick="setZoom('base')" id="z-base">BASE</button>
    <button class="zoom-btn" onclick="setZoom('module')" id="z-module">MODULES</button>
    <button class="zoom-btn" onclick="setZoom('crew')" id="z-crew">CREW</button>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="zoom-btn" onclick="toggleSim()" id="sim-btn">▶ START SIM</button>
    <select id="gov-sel" style="background:#0a0e14;border:1px solid var(--border);color:var(--text);padding:3px;font-family:var(--font);font-size:11px">
      <option value="engineer">ENGINEER</option><option value="contrarian">CONTRARIAN</option>
      <option value="wildcard">WILDCARD</option><option value="philosopher">PHILOSOPHER</option>
      <option value="survivalist">SURVIVALIST</option><option value="commander">COMMANDER</option>
      <option value="scientist">SCIENTIST</option><option value="diplomat">DIPLOMAT</option>
      <option value="merchant">MERCHANT</option><option value="hermit">HERMIT</option>
    </select>
  </div>
  <div class="status"><span class="pulsing"></span><span id="status-text">READY</span></div>
</div>

<!-- Globe (planet + surface zoom) -->
<div id="globe-container"><div id="globeViz"></div></div>

<!-- Warmap view (satellite tactical map between orbit and ground) -->
<div id="warmap-view" style="position:fixed;top:36px;left:0;right:0;bottom:0;z-index:45;display:none;background:#0a0e14">
  <div style="position:absolute;top:0;left:0;right:0;padding:8px 20px;background:var(--panel);border-bottom:1px solid var(--border);z-index:46;display:flex;align-items:center;justify-content:space-between">
    <h2 style="font-size:13px;color:var(--cyan);letter-spacing:1px">TACTICAL WARMAP — MARS SURFACE</h2>
    <div style="font-size:11px;color:var(--dim)">
      <span id="wm-count">0</span> colonies · <span id="wm-sol">Sol 0</span>
    </div>
  </div>
  <canvas id="warmap-canvas" style="width:100%;height:100%;cursor:crosshair"></canvas>
  <div id="warmap-tooltip" style="display:none;position:absolute;background:var(--panel);border:1px solid var(--cyan);border-radius:4px;padding:8px 12px;font-size:11px;pointer-events:none;z-index:47;min-width:160px"></div>
</div>

<!-- Ground view (base + module + crew zoom) -->
<div id="ground-view">
  <div class="ground-header">
    <h2 id="ground-title">ARES COLONY — GROUND VIEW</h2>
    <button class="back-btn" onclick="exitGround()">↑ RETURN TO ORBIT</button>
  </div>
  <div id="ground-canvas"></div>
  <div class="ground-hud" id="ground-hud"></div>
  <!-- Real Mars weather overlay -->
  <div id="weather-hud" style="position:fixed;top:80px;right:290px;z-index:60;background:var(--panel);
    border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-size:10px;min-width:180px">
    <div style="color:var(--cyan);font-weight:700;font-size:11px;margin-bottom:6px;letter-spacing:1px">REAL MARS WEATHER</div>
    <div id="wx-data" style="line-height:1.8"></div>
  </div>
</div>

<!-- Left panel: colony status -->
<div class="side-panel left" id="left-panel">
  <h3>Colony Status</h3>
  <div id="colony-info">Initializing...</div>
  <h3>Resources</h3>
  <div id="resources"></div>
  <h3>Systems</h3>
  <div id="systems"></div>
  <h3>Base Modules</h3>
  <div id="modules-list">No modules built</div>
</div>

<!-- Right panel: crew + events -->
<div class="side-panel right" id="right-panel">
  <h3>Crew Roster</h3>
  <div id="crew-roster">Awaiting telemetry...</div>
  <h3>Event Feed</h3>
  <div id="event-feed"></div>
  <h3>Mission Log</h3>
  <div id="mini-log" style="max-height:200px;overflow-y:auto;font-size:10px;color:var(--dim)"></div>
</div>

<script>
// ============================================================
// MARS BARN OPUS — 3D Colony Viewer
// Globe.gl for planet view, Three.js for ground view
// Same sim engine as index.html
// ============================================================

const MARS_TEX = 'https://unpkg.com/three-globe/example/img/earth-topology.png';
const BG = 'https://unpkg.com/three-globe/example/img/night-sky.png';

// ── Real Mars Climate Engine (NASA Mission Data) ──────────────────
// Sources: Viking 1&2, Curiosity/REMS, Perseverance/MEDA, MCD v6.1
const JEZERO={lat:18.38,lon:77.58};
const MC_TEMP={0:[207,12,180,235],30:[210,11,185,240],60:[213,10,190,243],90:[208,11,184,238],
  120:[205,12,180,235],150:[210,13,182,245],180:[218,15,188,260],210:[225,18,190,272],
  240:[228,20,192,280],270:[222,17,189,272],300:[218,15,185,265],330:[212,13,183,250]};
const MC_PRES={0:[750,30],30:[730,25],60:[710,20],90:[700,20],120:[720,25],150:[750,30],
  180:[800,35],210:[860,40],240:[920,45],270:[960,40],300:[930,35],330:[850,30]};
const MC_SOLAR={0:[530,350,120],30:[510,340,115],60:[495,330,110],90:[490,325,105],
  120:[505,335,110],150:[530,350,120],180:[570,375,130],210:[620,410,140],
  240:[670,440,90],270:[715,470,80],300:[680,450,100],330:[610,400,135]};
const MC_DUST={0:[0.02,0.005,0,0.2,0.4],30:[0.02,0.005,0,0.2,0.4],60:[0.03,0.008,0,0.25,0.5],
  90:[0.03,0.008,0,0.25,0.5],120:[0.04,0.01,0,0.3,0.5],150:[0.05,0.015,0,0.3,0.6],
  180:[0.10,0.03,0.002,0.4,0.7],210:[0.15,0.05,0.005,0.5,0.8],240:[0.20,0.08,0.01,0.5,0.9],
  270:[0.25,0.10,0.015,0.6,0.95],300:[0.18,0.06,0.008,0.5,0.85],330:[0.08,0.02,0.002,0.3,0.6]};
const MC_WIND={0:[4,12],30:[3.5,10],60:[3,9],90:[3,8],120:[3.5,10],150:[4,12],
  180:[5.5,16],210:[7,22],240:[8.5,28],270:[9,35],300:[7.5,25],330:[5,15]};
const MC_SEASONS=['Early Spring','Spring','Late Spring','Early Summer','Mid Summer','Late Summer',
  'Autumn Equinox','Dust Season','Peak Dust','Perihelion','Late Winter','Winter Waning'];

function mcInterp(table,ls){
  const bin=Math.floor((((ls%360)+360)%360)/30)*30,next=(bin+30)%360;
  const f=(((ls%360)+360)%360-bin)/30;
  return table[bin].map((v,i)=>v+(table[next][i]-v)*f);
}
function marsDateNow(){
  const jd=Date.now()/86400000+2440587.5+69.184/86400,dJ=jd-2451545.0;
  const msd=(dJ-4.5)/1.0274912517+44796.0-0.00096,M=(19.3871+0.52402075*msd)%360;
  const Mr=M*Math.PI/180;
  const eoc=10.691*Math.sin(Mr)+0.623*Math.sin(2*Mr)+0.050*Math.sin(3*Mr)+0.005*Math.sin(4*Mr);
  let ls=(M+eoc+270.3863)%360;if(ls<0)ls+=360;
  let lmst=((24*msd)%24+JEZERO.lon/15)%24;if(lmst<0)lmst+=24;
  return{msd,ls,lmst,sol:Math.floor(msd)};
}
function getMarsWeather(){
  const md=marsDateNow(),t=mcInterp(MC_TEMP,md.ls),p=mcInterp(MC_PRES,md.ls);
  const s=mcInterp(MC_SOLAR,md.ls),d=mcInterp(MC_DUST,md.ls),w=mcInterp(MC_WIND,md.ls);
  const phase=(md.lmst-14)/24*2*Math.PI;
  const tempK=(t[2]+t[3])/2+((t[3]-t[2])/2)*Math.cos(phase);
  const tau=0.3+d[3]*1.5,surfSolar=Math.round(s[1]*(1-tau*0.4));
  return{sol:md.sol,ls:Math.round(md.ls*10)/10,lmst:md.lmst,
    season:MC_SEASONS[Math.floor((((md.ls%360)+360)%360)/30)],
    tempC:Math.round(tempK-273.15),tempK:Math.round(tempK),
    pressurePa:Math.round(p[0]),windMs:Math.round(w[0]*10)/10,
    gustMs:Math.round(w[1]),dustTau:Math.round(tau*100)/100,
    uvIndex:Math.round((s[1]/470)*12*(1-tau*0.3)*10)/10,
    solarWm2:surfSolar,dustStormProb:Math.round(d[0]*100),
    timeStr:`${String(Math.floor(md.lmst)).padStart(2,'0')}:${String(Math.floor((md.lmst%1)*60)).padStart(2,'0')}`};
}
let marsWeather=getMarsWeather();
setInterval(()=>{marsWeather=getMarsWeather()},30000);
// ── End Mars Climate Engine ──────────────────────────────────────

// Sim state (reuse from index.html engine)
const O2_PP=0.84,H2O_PP=2.5,FOOD_PP=2500,PWR_BASE=30,ISRU_O2=5,ISRU_H2O=12,GH_KCAL=15000,PANEL=200,EFF=0.22,SOL_H=24.66,PCRIT=50;
function rng32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t^=t+Math.imul(t^t>>>7,61|t);return((t^t>>>14)>>>0)/4294967296}}
let R=rng32(42);

let state={sol:0,alive:true,cause:null,arch:'engineer',
  o2:4*O2_PP*30,h2o:4*H2O_PP*30,food:4*FOOD_PP*30,power:500,
  s_eff:1,i_eff:1,g_eff:1,h_eff:1,cascade:'NOM',int_temp:293.15,morale:0.85,rad:0,
  crew:[
    {name:'Chen W.',role:'CMDR',hp:97,fat:0,mor:82,rad:0,alive:true,st:'Nominal'},
    {name:'Rodriguez M.',role:'ENGR',hp:96,fat:0,mor:85,rad:0,alive:true,st:'Nominal'},
    {name:'Okafor A.',role:'SCI',hp:98,fat:0,mor:78,rad:0,alive:true,st:'Nominal'},
    {name:'Johansson K.',role:'MED',hp:95,fat:0,mor:88,rad:0,alive:true,st:'Nominal'}
  ],
  events:[],log:[],modules:[],building:null,
  alloc:{h:.25,i:.4,g:.35,r:1},lat:18.38,lng:77.58
};

let globe=null, running=false, simInterval=null;
let currentZoom='planet';
let groundScene=null,groundCamera=null,groundRenderer=null,groundAnimId=null;

// ── Globe Setup ──
function initGlobe(){
  globe=Globe()(document.getElementById('globeViz'))
    .backgroundColor('rgba(0,0,0,0)')
    .showAtmosphere(true)
    .atmosphereColor('#ef4444')
    .atmosphereAltitude(0.15)
    .globeImageUrl(MARS_TEX)
    .backgroundImageUrl(BG);

  globe.htmlElementsData([{id:'ares',name:'Ares Colony',lat:state.lat,lng:state.lng,health:100}])
    .htmlElement(d=>{
      const el=document.createElement('div');
      el.style.cursor='pointer';
      el.style.pointerEvents='auto';
      el.innerHTML=`<div style="text-align:center">
        <div style="width:10px;height:10px;background:${d.health>60?'#3fb950':d.health>30?'#d29922':'#da3633'};
        border-radius:50%;box-shadow:0 0 10px ${d.health>60?'#3fb950':'#da3633'};border:1px solid #fff;
        margin:0 auto;animation:pulse 2s infinite"></div>
        <div style="background:rgba(0,0,0,0.85);color:#fff;padding:2px 6px;border-radius:3px;
        font-size:10px;margin-top:4px;border:1px solid rgba(255,255,255,0.2);white-space:nowrap">
        ${d.name}<br>HP: ${d.health}%</div></div>`;
      el.onclick=(e)=>{e.stopPropagation();enterGround()};
      return el;
    });

  globe.controls().autoRotate=true;
  globe.controls().autoRotateSpeed=0.3;
  globe.pointOfView({altitude:2.5});
  // Tint the globe reddish for Mars
  globe.globeMaterial().color.setHex(0xffccaa);
}

// ── Zoom Levels ──
function setZoom(level){
  currentZoom=level;
  document.querySelectorAll('.zoom-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('z-'+level)?.classList.add('active');

  // Fade out all views
  ['globe-container','warmap-view','ground-view'].forEach(id=>{
    document.getElementById(id).classList.add('fade-out');
  });

  // After fade, show the target view
  setTimeout(()=>{
    document.getElementById('warmap-view').style.display='none';
    document.getElementById('ground-view').style.display='none';
    document.getElementById('globe-container').style.display='none';

    if(level==='planet'||level==='surface'){
      exitGround();
      const el=document.getElementById('globe-container');
      el.style.display='block';
      setTimeout(()=>el.classList.remove('fade-out'),20);
      if(level==='planet')globe.pointOfView({altitude:2.5},1000);
      else globe.pointOfView({lat:state.lat,lng:state.lng,altitude:0.15},1000);
    } else if(level==='warmap'){
      exitGround();
      const el=document.getElementById('warmap-view');
      el.style.display='block';
      setTimeout(()=>el.classList.remove('fade-out'),20);
      renderWarmap();
    } else {
      const el=document.getElementById('ground-view');
      el.style.display='block';
      setTimeout(()=>el.classList.remove('fade-out'),20);
      enterGround();
    }
    // Update weather visibility
    updateAllUI();
  },300);
}

// ── Warmap View (2D tactical satellite map) ──
const WARMAP_COLONIES = [
  {id:'ares',name:'Ares Colony',lat:18.38,lng:77.58,type:'primary'},
  {id:'olympus',name:'Olympus Outpost',lat:18.65,lng:-133.8,type:'outpost'},
  {id:'hellas',name:'Hellas Basin Camp',lat:-42.4,lng:70.5,type:'camp'},
  {id:'valles',name:'Valles Station',lat:-13.9,lng:-59.2,type:'station'},
  {id:'polar',name:'North Polar Base',lat:80.0,lng:0.0,type:'research'},
];

let warmapCtx=null;
let warmapAnim=null;

function renderWarmap(){
  const canvas=document.getElementById('warmap-canvas');
  const rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=rect.width;
  canvas.height=rect.height-36;
  canvas.style.marginTop='36px';
  warmapCtx=canvas.getContext('2d');
  if(warmapAnim)cancelAnimationFrame(warmapAnim);

  document.getElementById('wm-count').textContent=WARMAP_COLONIES.length;
  document.getElementById('wm-sol').textContent='Sol '+state.sol;

  // Mouse hover for tooltips
  canvas.onmousemove=(e)=>{
    const r=canvas.getBoundingClientRect();
    const mx=e.clientX-r.left,my=e.clientY-r.top;
    let hit=null;
    WARMAP_COLONIES.forEach(c=>{
      const px=((c.lng+180)/360)*canvas.width;
      const py=((90-c.lat)/180)*canvas.height;
      if(Math.abs(mx-px)<15&&Math.abs(my-py)<15)hit=c;
    });
    const tip=document.getElementById('warmap-tooltip');
    if(hit){
      const isAres=hit.id==='ares';
      const hp=isAres?(state.alive?Math.max(10,80-state.sol*0.1):0):Math.floor(30+Math.random()*60);
      tip.style.display='block';
      tip.style.left=(e.clientX+12)+'px';
      tip.style.top=(e.clientY-40)+'px';
      tip.innerHTML=`<div style="color:var(--cyan);font-weight:700;margin-bottom:4px">${hit.name}</div>
        <div>Type: ${hit.type.toUpperCase()}</div>
        <div>Lat: ${hit.lat.toFixed(1)}° Lng: ${hit.lng.toFixed(1)}°</div>
        <div>Health: <span style="color:${hp>60?'var(--green)':hp>30?'var(--yellow)':'var(--red)'}">${hp}%</span></div>
        ${isAres?`<div>Sol: ${state.sol} | Crew: ${state.crew.filter(c=>c.alive).length}/4</div>
        <div>Modules: ${state.modules.length}</div>`:'<div style="color:var(--dim)">Simulated outpost</div>'}
        <div style="margin-top:4px;color:var(--cyan);font-size:10px">Click for ground view →</div>`;
    } else {
      tip.style.display='none';
    }
  };

  canvas.onclick=(e)=>{
    const r=canvas.getBoundingClientRect();
    const mx=e.clientX-r.left,my=e.clientY-r.top;
    WARMAP_COLONIES.forEach(c=>{
      const px=((c.lng+180)/360)*canvas.width;
      const py=((90-c.lat)/180)*canvas.height;
      if(Math.abs(mx-px)<15&&Math.abs(my-py)<15){
        if(c.id==='ares')setZoom('base');
        // Other colonies would open their ground views
      }
    });
  };

  let frame=0;
  function drawWarmap(){
    warmapAnim=requestAnimationFrame(drawWarmap);
    frame++;
    const ctx=warmapCtx;
    const W=canvas.width,H=canvas.height;

    // Dark Mars surface background
    ctx.fillStyle='#1a0f0a';
    ctx.fillRect(0,0,W,H);

    // Grid lines (lat/lng)
    ctx.strokeStyle='rgba(88,166,255,0.08)';
    ctx.lineWidth=0.5;
    for(let lat=-60;lat<=90;lat+=30){
      const y=((90-lat)/180)*H;
      ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
      ctx.fillStyle='rgba(88,166,255,0.15)';ctx.font='9px Courier New';
      ctx.fillText(lat+'°',4,y-3);
    }
    for(let lng=-180;lng<=180;lng+=60){
      const x=((lng+180)/360)*W;
      ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
      ctx.fillText(lng+'°',x+3,H-5);
    }

    // Mars surface features (simplified outlines)
    ctx.strokeStyle='rgba(180,100,50,0.15)';
    ctx.lineWidth=1;
    // Olympus Mons circle
    const omx=((226.2+180)/360)*W,omy=((90-18.65)/180)*H;
    ctx.beginPath();ctx.arc(omx,omy,20,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(180,100,50,0.06)';ctx.fill();
    ctx.fillStyle='rgba(180,100,50,0.2)';ctx.font='8px Courier New';
    ctx.fillText('Olympus Mons',omx-30,omy+28);
    // Hellas Basin
    const hx=((70.5+180)/360)*W,hy=((90+42.4)/180)*H;
    ctx.beginPath();ctx.arc(hx,hy,30,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(100,60,30,0.06)';ctx.fill();
    ctx.fillStyle='rgba(180,100,50,0.2)';
    ctx.fillText('Hellas Planitia',hx-35,hy+38);
    // Valles Marineris line
    const vx1=((-100+180)/360)*W,vx2=((-20+180)/360)*W,vy=((90+10)/180)*H;
    ctx.beginPath();ctx.moveTo(vx1,vy);ctx.lineTo(vx2,vy);ctx.stroke();
    ctx.fillText('Valles Marineris',vx1,vy-8);

    // Colony markers
    WARMAP_COLONIES.forEach(c=>{
      const px=((c.lng+180)/360)*W;
      const py=((90-c.lat)/180)*H;
      const isAres=c.id==='ares';
      const hp=isAres?(state.alive?Math.max(10,80-state.sol*0.1):0):50;
      const color=hp>60?'#3fb950':hp>30?'#d29922':'#da3633';
      const radius=isAres?8:5;

      // Pulse ring
      const pulseR=radius+4+Math.sin(frame*0.05)*3;
      ctx.beginPath();ctx.arc(px,py,pulseR,0,Math.PI*2);
      ctx.strokeStyle=color+'44';ctx.lineWidth=1;ctx.stroke();

      // Marker dot
      ctx.beginPath();ctx.arc(px,py,radius,0,Math.PI*2);
      ctx.fillStyle=color;ctx.fill();
      ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();

      // Glow
      const grad=ctx.createRadialGradient(px,py,0,px,py,radius*3);
      grad.addColorStop(0,color+'33');grad.addColorStop(1,'transparent');
      ctx.fillStyle=grad;ctx.beginPath();ctx.arc(px,py,radius*3,0,Math.PI*2);ctx.fill();

      // Label
      ctx.fillStyle='#fff';ctx.font=isAres?'bold 11px Courier New':'10px Courier New';
      ctx.fillText(c.name,px+radius+6,py+4);
      ctx.fillStyle=color;ctx.font='9px Courier New';
      ctx.fillText(`HP:${hp}%`,px+radius+6,py+15);
      if(isAres){
        ctx.fillStyle='var(--dim)';
        ctx.fillText(`Sol ${state.sol} | ${state.crew.filter(cr=>cr.alive).length} crew | ${state.modules.length} mod`,px+radius+6,py+26);
      }

      // Connection lines between colonies
      if(c.id!=='ares'){
        const ax=((WARMAP_COLONIES[0].lng+180)/360)*W;
        const ay=((90-WARMAP_COLONIES[0].lat)/180)*H;
        ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(px,py);
        ctx.strokeStyle='rgba(88,166,255,0.06)';ctx.lineWidth=0.5;
        ctx.setLineDash([4,8]);ctx.stroke();ctx.setLineDash([]);
      }
    });

    // Scan line effect
    const scanY=(frame*0.5)%H;
    ctx.strokeStyle='rgba(88,166,255,0.03)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,scanY);ctx.lineTo(W,scanY);ctx.stroke();
  }
  drawWarmap();
}

// ── Ground View (Three.js) ──
function enterGround(){
  document.getElementById('ground-view').style.display='block';
  if(!groundScene)buildGroundScene();
}
function exitGround(){
  document.getElementById('ground-view').style.display='none';
  if(groundAnimId)cancelAnimationFrame(groundAnimId);
  if(warmapAnim)cancelAnimationFrame(warmapAnim);
  if(groundRenderer){groundRenderer.dispose();document.getElementById('ground-canvas').innerHTML=''}
  groundScene=null;groundCamera=null;groundRenderer=null;
}

function buildGroundScene(){
  const c=document.getElementById('ground-canvas');
  c.innerHTML='';
  const T=window.THREE;if(!T)return;
  const w=c.clientWidth,h=c.clientHeight;

  groundScene=new T.Scene();
  // Mars sky — butterscotch/salmon gradient at horizon
  const isDustStorm=state.events.some(e=>e.type==='dust_storm');
  const skyColor=isDustStorm?0x553311:0x331a0d;
  const fogDensity=isDustStorm?0.025:0.006;
  groundScene.background=new T.Color(skyColor);
  groundScene.fog=new T.FogExp2(skyColor,fogDensity);

  groundCamera=new T.PerspectiveCamera(55,w/h,0.1,2000);
  groundCamera.position.set(0,15,40);
  groundCamera.lookAt(0,2,0);

  groundRenderer=new T.WebGLRenderer({antialias:true,alpha:false});
  groundRenderer.setSize(w,h);
  groundRenderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  groundRenderer.shadowMap.enabled=true;
  groundRenderer.shadowMap.type=T.PCFSoftShadowMap;
  groundRenderer.toneMapping=T.ACESFilmicToneMapping;
  groundRenderer.toneMappingExposure=isDustStorm?0.6:0.9;
  c.appendChild(groundRenderer.domElement);

  // Lighting — warm Mars sunlight
  const ambient=new T.AmbientLight(isDustStorm?0x442211:0x553322,isDustStorm?0.3:0.5);
  groundScene.add(ambient);
  const sun=new T.DirectionalLight(0xffeedd,isDustStorm?0.5:1.2);
  sun.position.set(50,60,30);sun.castShadow=true;
  sun.shadow.mapSize.width=2048;sun.shadow.mapSize.height=2048;
  sun.shadow.camera.left=-60;sun.shadow.camera.right=60;
  sun.shadow.camera.top=60;sun.shadow.camera.bottom=-60;
  groundScene.add(sun);
  // Warm fill light from ground (Mars regolith reflection)
  const fillLight=new T.HemisphereLight(0xffa060,0x8b4513,0.3);
  groundScene.add(fillLight);

  // Mars terrain — multi-layer for depth
  const gGeo=new T.PlaneGeometry(400,400,120,120);
  const verts=gGeo.attributes.position;
  const rr=rng32(42);
  for(let i=0;i<verts.count;i++){
    const x=verts.getX(i),y=verts.getY(i);
    // Large-scale hills + medium rocks + small detail
    const large=Math.sin(x*0.02)*Math.cos(y*0.015)*4;
    const medium=Math.sin(x*0.1+1)*Math.cos(y*0.08+2)*1.5;
    const small=(rr()-0.5)*1.2;
    verts.setZ(i,large+medium+small);
  }
  gGeo.computeVertexNormals();
  const gMat=new T.MeshStandardMaterial({
    color:0x8b4513,roughness:0.95,metalness:0.02,flatShading:true,
  });
  const gnd=new T.Mesh(gGeo,gMat);
  gnd.rotation.x=-Math.PI/2;gnd.receiveShadow=true;
  groundScene.add(gnd);

  // Scatter rocks on the surface
  for(let i=0;i<60;i++){
    const size=0.2+rr()*0.8;
    const rockGeo=new T.DodecahedronGeometry(size,0);
    const rockMat=new T.MeshStandardMaterial({color:0x6b3a1f,roughness:1,flatShading:true});
    const rock=new T.Mesh(rockGeo,rockMat);
    rock.position.set((rr()-0.5)*100,size*0.3,(rr()-0.5)*100);
    rock.rotation.set(rr()*3,rr()*3,rr()*3);
    rock.castShadow=true;
    groundScene.add(rock);
  }

  // Dust particles (floating in the air)
  const dustGeo=new T.BufferGeometry();
  const dustCount=isDustStorm?2000:400;
  const dustPos=new Float32Array(dustCount*3);
  for(let i=0;i<dustCount*3;i+=3){
    dustPos[i]=(rr()-0.5)*120;
    dustPos[i+1]=rr()*30;
    dustPos[i+2]=(rr()-0.5)*120;
  }
  dustGeo.setAttribute('position',new T.BufferAttribute(dustPos,3));
  const dustMat=new T.PointsMaterial({color:isDustStorm?0xcc8844:0xaa7744,size:isDustStorm?0.15:0.08,transparent:true,opacity:isDustStorm?0.6:0.3});
  const dustParticles=new T.Points(dustGeo,dustMat);
  groundScene.add(dustParticles);

  // ── Central Habitat Complex ──
  // Main dome (transparent pressurized shell)
  const domeG=new T.SphereGeometry(6,24,16,0,Math.PI*2,0,Math.PI/2);
  const domeM=new T.MeshPhysicalMaterial({color:0x88bbdd,roughness:0.1,metalness:0.3,
    transparent:true,opacity:0.25,clearcoat:1.0,clearcoatRoughness:0.1});
  const dome=new T.Mesh(domeG,domeM);
  groundScene.add(dome);
  // Dome base ring
  const ringG=new T.TorusGeometry(6,0.3,8,32);
  const ringM=new T.MeshStandardMaterial({color:0xaabbcc,metalness:0.8,roughness:0.2});
  const ring=new T.Mesh(ringG,ringM);
  ring.rotation.x=Math.PI/2;ring.position.y=0.1;
  groundScene.add(ring);
  // Interior light glow inside dome
  const glowLight=new T.PointLight(0xffeebb,0.6,15);
  glowLight.position.set(0,3,0);
  groundScene.add(glowLight);
  // Airlock cylinder
  const airlockG=new T.CylinderGeometry(1.2,1.2,2.5,12);
  const airlockM=new T.MeshStandardMaterial({color:0x667788,metalness:0.6,roughness:0.3});
  const airlock=new T.Mesh(airlockG,airlockM);
  airlock.position.set(6.5,1.25,0);airlock.castShadow=true;
  groundScene.add(airlock);
  // Airlock door (red indicator)
  const doorG=new T.PlaneGeometry(0.8,1.8);
  const doorM=new T.MeshBasicMaterial({color:0x44ff44});
  const door=new T.Mesh(doorG,doorM);
  door.position.set(7.7,1.2,0);door.rotation.y=Math.PI/2;
  groundScene.add(door);
  // Landing pad (flat octagon near the dome)
  const padG=new T.CylinderGeometry(8,8,0.15,8);
  const padM=new T.MeshStandardMaterial({color:0x555555,roughness:0.8,metalness:0.2});
  const pad=new T.Mesh(padG,padM);
  pad.position.set(20,0.08,0);
  groundScene.add(pad);
  // Landing pad markings (H)
  const hBar1=new T.Mesh(new T.BoxGeometry(4,0.02,0.5),new T.MeshBasicMaterial({color:0xffff00}));
  hBar1.position.set(20,0.17,0);groundScene.add(hBar1);
  const hBar2=new T.Mesh(new T.BoxGeometry(0.5,0.02,3),new T.MeshBasicMaterial({color:0xffff00}));
  hBar2.position.set(18,0.17,0);groundScene.add(hBar2);
  const hBar3=new T.Mesh(new T.BoxGeometry(0.5,0.02,3),new T.MeshBasicMaterial({color:0xffff00}));
  hBar3.position.set(22,0.17,0);groundScene.add(hBar3);

  // Built modules as distinct buildings
  const moduleShapes={
    greenhouse_dome:{color:0x22aa44,shape:'dome',scale:3},
    isru_plant:{color:0x6688cc,shape:'box',scale:4},
    repair_bay:{color:0xccaa44,shape:'box',scale:3},
    radiation_shelter:{color:0x888888,shape:'bunker',scale:3},
    solar_farm:{color:0x4488ff,shape:'flat',scale:5},
    water_extractor:{color:0x44aacc,shape:'tower',scale:2},
    comms_array:{color:0xcccccc,shape:'tower',scale:1},
    storage_depot:{color:0xaa8844,shape:'box',scale:3},
  };
  const angleStep=Math.PI*2/Math.max(1,state.modules.length+4);
  state.modules.forEach((mod,i)=>{
    const cfg=moduleShapes[mod.type]||{color:0x666666,shape:'box',scale:2};
    const angle=angleStep*(i+1);
    const dist=12+i*2;
    let mesh;
    if(cfg.shape==='dome'){
      const g=new T.SphereGeometry(cfg.scale,12,8,0,Math.PI*2,0,Math.PI/2);
      mesh=new T.Mesh(g,new T.MeshStandardMaterial({color:cfg.color,transparent:true,opacity:0.5,roughness:0.3}));
    }else if(cfg.shape==='tower'){
      const g=new T.CylinderGeometry(0.3,0.5,cfg.scale*4,8);
      mesh=new T.Mesh(g,new T.MeshStandardMaterial({color:cfg.color,metalness:0.7}));
      mesh.position.y=cfg.scale*2;
    }else if(cfg.shape==='flat'){
      const g=new T.BoxGeometry(cfg.scale*2,0.3,cfg.scale*2);
      mesh=new T.Mesh(g,new T.MeshStandardMaterial({color:cfg.color,metalness:0.5}));
      mesh.position.y=1.5;
    }else{
      const g=new T.BoxGeometry(cfg.scale,cfg.scale*1.5,cfg.scale);
      mesh=new T.Mesh(g,new T.MeshStandardMaterial({color:cfg.color,roughness:0.6}));
      mesh.position.y=cfg.scale*0.75;
    }
    mesh.position.x=Math.cos(angle)*dist;
    mesh.position.z=Math.sin(angle)*dist;
    mesh.castShadow=true;
    groundScene.add(mesh);

    // Connection tube to central dome
    const tubeG=new T.CylinderGeometry(0.15,0.15,dist-5,6);
    const tubeM=new T.Mesh(tubeG,new T.MeshStandardMaterial({color:0x555555,metalness:0.6}));
    tubeM.rotation.z=Math.PI/2;
    tubeM.rotation.y=-angle;
    tubeM.position.set(Math.cos(angle)*(5+dist)/2,0.5,Math.sin(angle)*(5+dist)/2);
    groundScene.add(tubeM);

    // Label
    const label=new T.Mesh(new T.PlaneGeometry(4,0.8),new T.MeshBasicMaterial({color:0x000000,transparent:true,opacity:0.7}));
    label.position.set(mesh.position.x,cfg.scale*2+2,mesh.position.z);
    label.lookAt(groundCamera.position);
    groundScene.add(label);
  });

  // ── Autonomous Rovers (realistic tracked vehicles) ──
  const robots=[];
  for(let i=0;i<8;i++){
    const body=new T.Group();
    // Rover body
    const chassisG=new T.BoxGeometry(1.2,0.4,0.8);
    const chassisM=new T.MeshStandardMaterial({color:0xdddddd,metalness:0.5,roughness:0.4});
    const chassis=new T.Mesh(chassisG,chassisM);
    chassis.position.y=0.3;body.add(chassis);
    // Rover head/sensor
    const headG=new T.BoxGeometry(0.4,0.3,0.5);
    const head=new T.Mesh(headG,new T.MeshStandardMaterial({color:0x333333,metalness:0.7}));
    head.position.set(0.4,0.6,0);body.add(head);
    // Status light
    const lightG=new T.SphereGeometry(0.08,6,6);
    const lightM=new T.MeshBasicMaterial({color:state.alive?0x44ff44:0xff4444});
    const statusLight=new T.Mesh(lightG,lightM);
    statusLight.position.set(0.4,0.8,0);body.add(statusLight);
    // Wheels
    for(const wx of [-0.4,0.4]){for(const wz of [-0.35,0.35]){
      const wheelG=new T.CylinderGeometry(0.15,0.15,0.1,8);
      const wheel=new T.Mesh(wheelG,new T.MeshStandardMaterial({color:0x222222,roughness:0.9}));
      wheel.rotation.x=Math.PI/2;wheel.position.set(wx,0.15,wz);body.add(wheel);
    }}
    body.position.set((rr()-0.5)*40,0,(rr()-0.5)*40);
    body.castShadow=true;
    groundScene.add(body);
    robots.push({mesh:body,light:statusLight,vx:(rr()-0.5)*0.04,vz:(rr()-0.5)*0.04,timer:rr()*300,
      task:['patrol','sample','repair','survey'][Math.floor(rr()*4)]});
  }

  // ── Communications Array (tall antenna + dish) ──
  const aGeo=new T.CylinderGeometry(0.08,0.12,18,6);
  const antenna=new T.Mesh(aGeo,new T.MeshStandardMaterial({color:0xcccccc,metalness:0.9,roughness:0.1}));
  antenna.position.set(-12,9,-10);antenna.castShadow=true;
  groundScene.add(antenna);
  // Dish
  const dishG=new T.SphereGeometry(2,12,8,0,Math.PI*2,0,Math.PI/3);
  const dishM=new T.MeshStandardMaterial({color:0xdddddd,metalness:0.7,roughness:0.2,side:T.DoubleSide});
  const dish=new T.Mesh(dishG,dishM);
  dish.position.set(-12,16,-10);dish.rotation.x=Math.PI*0.7;
  groundScene.add(dish);
  // Blink light
  const blink=new T.Mesh(new T.SphereGeometry(0.2,6,6),new T.MeshBasicMaterial({color:0xff0000}));
  blink.position.set(-12,18.5,-10);
  groundScene.add(blink);

  // ── Solar Panel Array (if no solar_farm module yet) ──
  for(let i=0;i<4;i++){
    const panelG=new T.BoxGeometry(3,0.05,2);
    const panelM=new T.MeshStandardMaterial({color:0x2244aa,metalness:0.4,roughness:0.3});
    const panel=new T.Mesh(panelG,panelM);
    panel.position.set(-20+i*4,2,-15);
    panel.rotation.x=-0.3;
    panel.castShadow=true;
    groundScene.add(panel);
    // Panel support pole
    const poleG=new T.CylinderGeometry(0.08,0.08,2,4);
    const pole=new T.Mesh(poleG,new T.MeshStandardMaterial({color:0x888888,metalness:0.7}));
    pole.position.set(-20+i*4,1,-15);
    groundScene.add(pole);
  }

  // ── Crew Figures (tiny humanoid shapes near the dome) ──
  const crewFigures=[];
  state.crew.filter(c=>c.alive).forEach((c,i)=>{
    const fig=new T.Group();
    // Body
    const bodyG=new T.CylinderGeometry(0.15,0.2,0.8,6);
    const bodyM=new T.MeshStandardMaterial({
      color:c.role==='CMDR'?0xff8800:c.role==='ENGR'?0x4488ff:c.role==='SCI'?0x44ff44:0xff4488
    });
    fig.add(new T.Mesh(bodyG,bodyM));
    // Helmet
    const helmG=new T.SphereGeometry(0.2,8,6);
    const helmM=new T.MeshPhysicalMaterial({color:0xeeeeee,metalness:0.3,roughness:0.1,
      clearcoat:0.8,transparent:true,opacity:0.7});
    const helm=new T.Mesh(helmG,helmM);
    helm.position.y=0.55;fig.add(helm);
    // Visor
    const visorG=new T.SphereGeometry(0.12,6,4,0,Math.PI);
    const visorM=new T.MeshBasicMaterial({color:0x88ccff});
    const visor=new T.Mesh(visorG,visorM);
    visor.position.set(0,0.55,0.12);fig.add(visor);

    const angle=Math.PI*0.5+i*1.2;
    fig.position.set(Math.cos(angle)*8,0.5,Math.sin(angle)*8);
    fig.castShadow=true;
    groundScene.add(fig);
    crewFigures.push({mesh:fig,baseAngle:angle,walkSpeed:0.003+rr()*0.002});
  });

  // ── Animate ──
  let frame=0;
  function animate(){
    groundAnimId=requestAnimationFrame(animate);
    frame++;

    // Slow orbiting camera with gentle bob
    const camAngle=frame*0.0015;
    const camDist=40+Math.sin(frame*0.001)*5;
    const camHeight=15+Math.sin(frame*0.002)*3;
    groundCamera.position.x=camDist*Math.sin(camAngle);
    groundCamera.position.z=camDist*Math.cos(camAngle);
    groundCamera.position.y=camHeight;
    groundCamera.lookAt(0,2,0);

    // Dust particle drift
    const dPos=dustParticles.geometry.attributes.position;
    for(let i=0;i<dPos.count;i++){
      dPos.setX(i,dPos.getX(i)+(isDustStorm?0.08:0.02));
      dPos.setY(i,dPos.getY(i)+Math.sin(frame*0.01+i)*0.01);
      if(dPos.getX(i)>60)dPos.setX(i,-60);
    }
    dPos.needsUpdate=true;

    // Rover movement
    robots.forEach(r=>{
      r.timer--;
      if(r.timer<=0){
        r.vx=(rr()-0.5)*0.04;r.vz=(rr()-0.5)*0.04;
        r.timer=150+rr()*300;
      }
      r.mesh.position.x+=r.vx;r.mesh.position.z+=r.vz;
      r.mesh.rotation.y=Math.atan2(r.vx,r.vz);
      if(Math.abs(r.mesh.position.x)>50){r.vx*=-1;r.mesh.position.x=Math.sign(r.mesh.position.x)*49}
      if(Math.abs(r.mesh.position.z)>50){r.vz*=-1;r.mesh.position.z=Math.sign(r.mesh.position.z)*49}
      // Blink rover light
      r.light.material.color.setHex(Math.floor(frame/20+robots.indexOf(r)*7)%2?0x44ff44:0x116611);
    });

    // Crew walking
    crewFigures.forEach((cf,i)=>{
      const a=cf.baseAngle+Math.sin(frame*cf.walkSpeed)*0.8;
      cf.mesh.position.x=Math.cos(a)*8;
      cf.mesh.position.z=Math.sin(a)*8;
      cf.mesh.rotation.y=a+Math.PI/2;
      // Slight bob while walking
      cf.mesh.position.y=0.5+Math.abs(Math.sin(frame*0.05+i))*0.1;
    });

    // Antenna dish rotation
    dish.rotation.y=frame*0.003;

    // Blink
    blink.material.color.setHex(Math.floor(frame/40)%2?0xff0000:0x220000);

    // Interior dome light flicker (subtle)
    glowLight.intensity=0.5+Math.sin(frame*0.02)*0.1;

    groundRenderer.render(groundScene,groundCamera);
  }
  animate();
}

// ── Sim Engine (same as index.html, minimal) ──
function solIrr(sol){
  const sy=sol%669,oa=2*Math.PI*(sy-445)/669,of=1+0.09*Math.cos(oa);
  const sc=589*of,ls=2*Math.PI*sy/669,el=Math.max(0.3,Math.cos(ls)*0.5+0.5);
  const dust=state.events.some(e=>e.type==='dust_storm')?0.25:1;
  return sc*el*dust*0.7;
}
function stepSim(){
  if(!state.alive)return;
  state.sol++;const s=state.sol;
  const ac=state.crew.filter(c=>c.alive);
  if(!ac.length){state.alive=false;state.cause='all crew lost';return}
  // Events
  state.events=state.events.filter(e=>{e.remaining--;return e.remaining>0});
  const probs={dust_storm:0.12,solar_flare:0.04,meteorite:0.003,equipment_failure:0.02};
  const newEv=[];const types=state.events.map(e=>e.type);
  for(const[t,p]of Object.entries(probs)){
    if(types.includes(t))continue;
    if(R()<p){const sv=0.2+R()*0.8,dur=t==='dust_storm'?Math.floor(5+R()*25):Math.floor(1+R()*5);
      const ev={type:t,severity:sv,remaining:dur,duration:dur};state.events.push(ev);newEv.push(ev);
      if(t==='meteorite'){state.s_eff*=(1-0.15*sv);state.g_eff*=(1-0.2*sv)}
      if(t==='equipment_failure'){state.i_eff*=(1-0.15*sv);state.power-=20*sv}
    }
  }
  // Production
  const irr=solIrr(s);
  const a=state.alloc;
  state.power+=irr*PANEL*EFF*SOL_H/1000*state.s_eff*(1+state.modules.filter(m=>m.type==='solar_farm').length*0.4);
  if(state.power>PCRIT*0.3){
    const is=Math.min(1.5,a.i*2),ib=1+state.modules.filter(m=>m.type==='isru_plant').length*0.4;
    state.o2+=ISRU_O2*state.i_eff*is*ib;state.h2o+=ISRU_H2O*state.i_eff*is*ib;
  }
  state.h2o+=state.modules.filter(m=>m.type==='water_extractor').length*3;
  if(state.power>PCRIT*0.3&&state.h2o>5){
    const gs=Math.min(1.5,a.g*2),gb=1+state.modules.filter(m=>m.type==='greenhouse_dome').length*0.5;
    state.food+=GH_KCAL*state.g_eff*gs*gb;
  }
  // Consumption
  const n=ac.length;
  state.o2=Math.max(0,state.o2-n*O2_PP);state.h2o=Math.max(0,state.h2o-n*H2O_PP);
  state.food=Math.max(0,state.food-n*FOOD_PP*a.r);state.power=Math.max(0,state.power-PWR_BASE);
  // Thermal
  state.int_temp=Math.max(200,Math.min(310,state.int_temp+(state.power>PCRIT?0.5:-2)));
  state.rad+=0.335;
  // Crew
  ac.forEach(m=>{
    m.rad+=0.335;
    if(state.food/(n*FOOD_PP)<0.3){m.hp-=3;m.mor-=5;m.st='STARVING'}
    else if(state.h2o/(n*H2O_PP)<0.3){m.hp-=5;m.mor-=3;m.st='DEHYDRATED'}
    else if(state.int_temp<263){m.hp-=4;m.st='HYPOTHERMIC'}
    else{m.hp=Math.min(100,m.hp+0.5);m.st='Nominal'}
    m.mor=Math.max(0,Math.min(100,m.mor));
    if(m.hp<=0){m.alive=false;m.st='DECEASED'}
  });
  state.morale=ac.reduce((s,m)=>s+m.mor,0)/Math.max(1,ac.length)/100;
  if(state.o2<=0){state.alive=false;state.cause='O2 depletion'}
  if(state.food<=0){state.alive=false;state.cause='starvation'}
  // Governor
  const o2d=state.o2/(O2_PP*n),h2od=state.h2o/(H2O_PP*n),fd=state.food/(FOOD_PP*n);
  if(o2d<5||h2od<5){a.h=0.15;a.i=0.70;a.g=0.15;a.r=fd<5?0.5:0.75}
  else if(fd<10){a.h=0.15;a.i=0.30;a.g=0.55;a.r=0.75}
  // Auto-build
  if(!state.building&&state.sol>15&&o2d>10&&fd>10){
    const opts=['greenhouse_dome','isru_plant','solar_farm','water_extractor','repair_bay','radiation_shelter','comms_array','storage_depot'];
    const built=new Set(state.modules.map(m=>m.type));
    const need=opts.find(o=>!built.has(o)||(o==='solar_farm'&&state.modules.filter(m=>m.type==='solar_farm').length<3));
    if(need){state.building={type:need,remaining:Math.floor(8+R()*12)};}
  }
  if(state.building){state.building.remaining--;if(state.building.remaining<=0){
    state.modules.push({type:state.building.type,built:s});
    state.log.push(`Sol ${s}: ${state.building.type.replace(/_/g,' ')} COMPLETED`);
    state.building=null;
  }}
  // Log
  state.log.push(`Sol ${s}: ${(state.int_temp-273.15).toFixed(0)}°C int, ${ac.length} crew, ${(state.o2/(O2_PP*n)).toFixed(0)}d O2`);
  if(newEv.length)state.log.push(`  ⚠ ${newEv.map(e=>e.type.replace(/_/g,' ')).join(', ')}`);
  if(!state.alive)state.log.push(`COLONY LOST: ${state.cause}`);
  updateAllUI();
}

// ── UI Updates ──
function updateAllUI(){
  const s=state,ac=s.crew.filter(c=>c.alive),n=Math.max(1,ac.length);
  // Status
  document.getElementById('status-text').textContent=s.alive?`SOL ${s.sol} | ${s.arch.toUpperCase()} | ${ac.length} CREW`:'COLONY LOST — '+s.cause;
  // Colony info
  document.getElementById('colony-info').innerHTML=`
    <div class="colony-card"><span class="name">Ares Colony</span><span class="hp" style="color:${s.alive?'var(--green)':'var(--red)'}">${s.alive?'ACTIVE':'DEAD'}</span>
    <div style="margin-top:4px;font-size:10px">Sol ${s.sol} | Morale ${(s.morale*100).toFixed(0)}% | Rad ${s.rad.toFixed(0)} mSv</div>
    <div class="hp-bar"><div class="hp-fill" style="width:${Math.max(0,Math.min(100,s.alive?80:0))}%;background:${s.alive?'var(--green)':'var(--red)'}"></div></div></div>`;
  // Resources
  const res=[['O₂',s.o2,n*O2_PP*60,s.o2/(n*O2_PP),'--blue'],['H₂O',s.h2o,n*H2O_PP*60,s.h2o/(n*H2O_PP),'--blue'],
    ['Food',s.food,n*FOOD_PP*60,s.food/(n*FOOD_PP),'--yellow'],['Power',s.power,1000,s.power/PWR_BASE,'--purple']];
  document.getElementById('resources').innerHTML=res.map(([l,v,mx,d,c])=>{
    const pct=Math.min(100,v/mx*100);const col=pct>50?'var(--green)':pct>20?'var(--yellow)':'var(--red)';
    return`<div class="res-bar"><span class="res-label">${l}</span><div class="res-track"><div class="res-fill" style="width:${pct}%;background:${col}"></div></div><span class="res-val">${d.toFixed(0)}d</span></div>`;
  }).join('');
  // Systems
  const sys=[['Solar',s.s_eff],['ISRU',s.i_eff],['GreenH',s.g_eff],['Heat',s.h_eff]];
  document.getElementById('systems').innerHTML=sys.map(([l,v])=>{
    const pct=v*100;const col=pct>70?'var(--green)':pct>30?'var(--yellow)':'var(--red)';
    return`<div class="res-bar"><span class="res-label">${l}</span><div class="res-track"><div class="res-fill" style="width:${pct}%;background:${col}"></div></div><span class="res-val">${pct.toFixed(0)}%</span></div>`;
  }).join('');
  // Modules
  document.getElementById('modules-list').innerHTML=s.modules.length?
    s.modules.map(m=>`<div class="module-item"><span>${m.type.replace(/_/g,' ')}</span><span class="status">✓ Sol ${m.built}</span></div>`).join('')
    +(s.building?`<div class="module-item" style="color:var(--yellow)"><span>${s.building.type.replace(/_/g,' ')}</span><span>${s.building.remaining} sols</span></div>`:'')
    :'Landing habitat only'+(s.building?`<div style="color:var(--yellow);margin-top:4px">Building: ${s.building.type.replace(/_/g,' ')} (${s.building.remaining} sols)</div>`:'');
  // Crew
  document.getElementById('crew-roster').innerHTML=s.crew.map(m=>{
    const col=!m.alive?'var(--red)':m.hp>70?'var(--green)':m.hp>30?'var(--yellow)':'var(--red)';
    return`<div class="crew-row"><span style="color:${col};width:8px">●</span><span style="width:100px">${m.name}</span><span style="width:40px;color:var(--dim)">${m.role}</span><span style="width:35px;text-align:right;color:${col}">${m.alive?m.hp.toFixed(0):'--'}</span><span style="flex:1;text-align:right;font-size:10px;color:var(--dim)">${m.st}</span></div>`;
  }).join('');
  // Events
  const recent=s.events.slice(-5);
  document.getElementById('event-feed').innerHTML=recent.length?recent.map(e=>
    `<div class="event-item"><span class="tag">${e.type.replace(/_/g,' ').toUpperCase()}</span> sev ${e.severity.toFixed(1)} (${e.remaining} sols)</div>`
  ).join(''):'<div class="event-item">No active events</div>';
  // Log
  document.getElementById('mini-log').innerHTML=s.log.slice(-20).map(l=>
    l.includes('COLONY LOST')?`<div style="color:var(--red)">${l}</div>`:
    l.includes('⚠')?`<div style="color:var(--yellow)">${l}</div>`:
    l.includes('COMPLETED')?`<div style="color:var(--green)">${l}</div>`:
    `<div>${l}</div>`
  ).join('');
  document.getElementById('mini-log').scrollTop=9999;
  // Globe colony marker
  if(globe){
    const hp=s.alive?Math.max(10,Math.min(100,80-s.sol*0.1)):0;
    globe.htmlElementsData([{id:'ares',name:`Ares Colony (Sol ${s.sol})`,lat:s.lat,lng:s.lng,health:hp}]);
  }
  // Ground HUD
  document.getElementById('ground-hud').innerHTML=`
    <div class="hud-stat"><div class="hud-val">${s.sol}</div><div class="hud-label">Sol</div></div>
    <div class="hud-stat"><div class="hud-val">${ac.length}/4</div><div class="hud-label">Crew</div></div>
    <div class="hud-stat"><div class="hud-val">${(s.o2/(n*O2_PP)).toFixed(0)}d</div><div class="hud-label">O₂</div></div>
    <div class="hud-stat"><div class="hud-val">${(s.h2o/(n*H2O_PP)).toFixed(0)}d</div><div class="hud-label">H₂O</div></div>
    <div class="hud-stat"><div class="hud-val">${(s.food/(n*FOOD_PP)).toFixed(0)}d</div><div class="hud-label">Food</div></div>
    <div class="hud-stat"><div class="hud-val">${s.power.toFixed(0)}</div><div class="hud-label">kWh</div></div>
    <div class="hud-stat"><div class="hud-val">${s.modules.length}</div><div class="hud-label">Modules</div></div>
    <div class="hud-stat"><div class="hud-val" style="color:${s.alive?'var(--green)':'var(--red)'}">${s.alive?'ALIVE':'DEAD'}</div><div class="hud-label">Status</div></div>
  `;
  // Real Mars weather HUD
  const w=marsWeather;
  const wxEl=document.getElementById('wx-data');
  if(wxEl){
    const stormRisk=w.dustStormProb>10?`<span style="color:var(--red)">${w.dustStormProb}%</span>`:`<span style="color:var(--green)">${w.dustStormProb}%</span>`;
    wxEl.innerHTML=`
      <div>LMST: <span style="color:#fff">${w.timeStr}</span></div>
      <div>Season: <span style="color:#fff">${w.season}</span></div>
      <div>Ls: <span style="color:#fff">${w.ls}°</span></div>
      <div>Temp: <span style="color:${w.tempC>-40?'var(--yellow)':'var(--cyan)'}">${w.tempC}°C</span> (${w.tempK}K)</div>
      <div>Pressure: <span style="color:#fff">${w.pressurePa} Pa</span></div>
      <div>Wind: <span style="color:#fff">${w.windMs} m/s</span> (gusts ${w.gustMs})</div>
      <div>Solar: <span style="color:var(--yellow)">${w.solarWm2} W/m²</span></div>
      <div>Dust τ: <span style="color:#fff">${w.dustTau}</span></div>
      <div>UV: <span style="color:#fff">${w.uvIndex}</span></div>
      <div>Storm Risk: ${stormRisk}/sol</div>
      <div>Real Sol: <span style="color:var(--cyan)">${w.sol}</span></div>`;
  }
  // Show/hide weather based on zoom
  const wxPanel=document.getElementById('weather-hud');
  if(wxPanel)wxPanel.style.display=(currentZoom==='base'||currentZoom==='module'||currentZoom==='crew')?'block':'none';
}

function toggleSim(){
  if(running){running=false;clearInterval(simInterval);document.getElementById('sim-btn').textContent='▶ RESUME';return}
  running=true;document.getElementById('sim-btn').textContent='⏸ PAUSE';
  simInterval=setInterval(()=>{
    stepSim();
    if(!state.alive){running=false;clearInterval(simInterval);document.getElementById('sim-btn').textContent='COLONY LOST'}
  },500);
}

function resetState(){
  const seed=Math.floor(Math.random()*99999);R=rng32(seed);
  const arch=document.getElementById('gov-sel').value;
  state={sol:0,alive:true,cause:null,arch,o2:4*O2_PP*30,h2o:4*H2O_PP*30,food:4*FOOD_PP*30,power:500,
    s_eff:1,i_eff:1,g_eff:1,h_eff:1,cascade:'NOM',int_temp:293.15,morale:0.85,rad:0,
    crew:[{name:'Chen W.',role:'CMDR',hp:97,fat:0,mor:82,rad:0,alive:true,st:'Nominal'},
      {name:'Rodriguez M.',role:'ENGR',hp:96,fat:0,mor:85,rad:0,alive:true,st:'Nominal'},
      {name:'Okafor A.',role:'SCI',hp:98,fat:0,mor:78,rad:0,alive:true,st:'Nominal'},
      {name:'Johansson K.',role:'MED',hp:95,fat:0,mor:88,rad:0,alive:true,st:'Nominal'}],
    events:[],log:[],modules:[],building:null,alloc:{h:.25,i:.4,g:.35,r:1},lat:18.38,lng:77.58};
  document.getElementById('sim-btn').textContent='▶ START SIM';
  updateAllUI();
}

// Init
initGlobe();
resetState();
</script>
